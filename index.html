<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GEOM 2120 · Survey Computations Trainer</title>
<style>
  :root{
    --bg:#0e1220; --panel:#171c2e; --panel2:#1f2740; --ink:#e8ecf7; --mut:#93a0c0;
    --line:#2a3350; --acc:#4ad1a4; --acc2:#5b9cff; --warn:#ffb454; --bad:#ff6b81;
    --good:#3ddc97; --gold:#ffd166; --m1:#f6c945; --m2:#7fd1e8; --m3:#4ad1a4; --m4:#5b9cff; --m5:#c08bff; --m6:#ff9e7d; --m7:#9adf62; --m8:#ff8fc6;
    --r:14px; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%,rgba(91,156,255,.10) 0,transparent 60%),var(--bg);
    color:var(--ink); -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:780px;margin:0 auto;padding:18px 16px 60px}
  h1{font-size:20px;margin:0;letter-spacing:.2px}
  h1 small{display:block;font-size:12px;color:var(--mut);font-weight:500;letter-spacing:.4px;margin-top:2px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
  .hud{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .chip{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:12px;color:var(--mut);white-space:nowrap}
  .chip b{color:var(--ink)} .chip .lv{color:var(--gold)}
  .hearts{letter-spacing:2px;font-size:13px}
  .xpwrap{height:8px;background:var(--panel2);border-radius:999px;overflow:hidden;margin:2px 0 16px;border:1px solid var(--line)}
  .xpbar{height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
  .muted{color:var(--mut)}
  .pill{display:inline-block;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--bg);background:var(--acc);padding:3px 9px;border-radius:999px;font-weight:700}
  .pill.q{background:var(--acc2)} .pill.s{background:var(--warn)} .pill.n{background:var(--gold)}
  .qtext{font-size:17px;margin:14px 0 4px;font-weight:600}
  .sub{color:var(--mut);font-size:13px;margin-bottom:14px}
  .btn{appearance:none;border:1px solid var(--line);background:var(--panel2);color:var(--ink);
       padding:13px 15px;border-radius:11px;font-size:15px;cursor:pointer;text-align:left;width:100%;
       transition:transform .06s ease,border-color .15s,background .15s}
  .btn:hover{border-color:#3b466e}
  .btn:active{transform:translateY(1px)}
  .opts{display:grid;gap:10px;margin-top:6px}
  .btn.correct{border-color:var(--good);background:rgba(61,220,151,.13)}
  .btn.wrong{border-color:var(--bad);background:rgba(255,107,129,.12)}
  .btn:disabled{cursor:default;opacity:.85}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .num{display:flex;gap:10px;margin-top:6px}
  input[type=text]{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--ink);
       padding:13px 14px;border-radius:11px;font-size:16px;font-variant-numeric:tabular-nums}
  input[type=text]:focus{outline:none;border-color:var(--acc2)}
  .ghost{font-size:12px;color:var(--mut);margin-top:7px}
  .primary{background:linear-gradient(90deg,var(--acc),var(--acc2));color:#04231b;border:none;font-weight:700;width:auto;padding:13px 22px}
  .seqpool,.seqans{display:grid;gap:8px;margin-top:8px}
  .seqans{min-height:8px}
  .seqitem{cursor:pointer;user-select:none}
  .seqslot{border:1px dashed var(--line);border-radius:11px;padding:11px 13px;background:rgba(255,255,255,.02);display:flex;gap:10px;align-items:center}
  .seqslot .ix{width:22px;height:22px;border-radius:50%;background:var(--panel2);display:grid;place-items:center;font-size:12px;color:var(--mut);flex:none}
  .fb{margin-top:16px;padding:13px 15px;border-radius:11px;font-size:14px;display:none}
  .fb.show{display:block}
  .fb.ok{background:rgba(61,220,151,.12);border:1px solid var(--good)}
  .fb.no{background:rgba(255,107,129,.1);border:1px solid var(--bad)}
  .fb b{color:var(--ink)}
  .fb .formula{font-family:ui-monospace,Menlo,Consolas,monospace;background:var(--bg);padding:2px 6px;border-radius:6px;border:1px solid var(--line)}
  .footer{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px}
  .combo{font-size:13px;color:var(--gold);font-weight:700;opacity:0;transition:opacity .2s}
  .combo.show{opacity:1}
  .modegrid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:8px}
  .mode{display:flex;gap:14px;align-items:flex-start;padding:16px;cursor:pointer;border-left:3px solid transparent}
  .mode:hover{border-color:var(--line)}
  .mode .emo{font-size:26px;line-height:1}
  .mode h3{margin:0 0 3px;font-size:16px}
  .mode p{margin:0;color:var(--mut);font-size:13px}
  .mode .tag{font-size:11px;color:var(--mut)}
  .m1b{border-left-color:var(--m1)} .m2b{border-left-color:var(--m2)} .m3b{border-left-color:var(--m3)} .m4b{border-left-color:var(--m4)} .m5b{border-left-color:var(--m5)} .m6b{border-left-color:var(--m6)} .m7b{border-left-color:var(--m7)} .m8b{border-left-color:var(--m8)} .allb{border-left-color:var(--gold)}
  .center{text-align:center}
  .big{font-size:40px;margin:6px 0}
  .tag{font-size:12px;color:var(--mut)}
  table.mini{width:100%;border-collapse:collapse;margin-top:10px;font-size:12.5px}
  table.mini th,table.mini td{border:1px solid var(--line);padding:5px 7px;text-align:left}
  table.mini th{background:var(--panel2);color:var(--mut);font-weight:600}
  a.link{color:var(--acc2);text-decoration:none;cursor:pointer}
  .lesson-tbl{overflow-x:auto;animation:fade .45s ease}
  @keyframes fade{from{opacity:.15;transform:translateY(4px)}to{opacity:1;transform:none}}
  table.mini td.hl,table.mini th.hl{background:rgba(74,209,164,.22);color:var(--ink);font-weight:700;transition:background .3s}
  .dots{display:flex;gap:6px;justify-content:center;margin:2px 0 14px;flex-wrap:wrap}
  .dots i{width:8px;height:8px;border-radius:50%;background:var(--panel2);border:1px solid var(--line)}
  .dots i.on{background:var(--acc);border-color:var(--acc)}
  .dots i.done{background:var(--line)}
  .lead{font-size:15px;color:var(--ink);margin:6px 0 4px}
  .kfoot{margin-top:13px;padding:12px 14px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);font-size:14px;color:var(--ink)}
  .lesson-head{font-size:18px;font-weight:700;margin:6px 0 2px}
  .fab{position:fixed;right:16px;bottom:16px;z-index:40;background:linear-gradient(90deg,var(--acc),var(--acc2));
       color:#04231b;border:none;font-weight:700;padding:11px 16px;border-radius:999px;box-shadow:var(--shadow);cursor:pointer;font-size:14px}
  .modal{position:fixed;inset:0;background:rgba(4,7,16,.74);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:22px 12px;overflow:auto}
  .modal.show{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:660px;width:100%;padding:18px;box-shadow:var(--shadow)}
  .sheet h3{margin:2px 0 10px}
  .sheet .x{float:right;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:5px 11px;cursor:pointer;font-size:13px}
  .figsvg{width:100%;height:auto;background:var(--bg);border:1px solid var(--line);border-radius:12px;margin-top:2px}
  #figInline{margin:8px 0 14px}
  #figInline .figsvg{width:auto;max-width:100%;max-height:290px;display:block;margin:0 auto}
  .toast{position:fixed;left:50%;top:18px;transform:translateX(-50%) translateY(-80px);
    background:var(--gold);color:#3a2c00;font-weight:700;padding:10px 18px;border-radius:999px;
    box-shadow:var(--shadow);transition:transform .35s cubic-bezier(.2,1.3,.4,1);z-index:50}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .scoreline{display:flex;justify-content:space-around;margin:18px 0;text-align:center}
  .scoreline div span{display:block;font-size:26px;font-weight:700}
  .scoreline div small{color:var(--mut)}
  .crumb{font-size:12px;color:var(--mut);margin-bottom:10px}
  .crumb a{color:var(--acc2);cursor:pointer;text-decoration:none}
  ol.proc{line-height:1.85;padding-left:20px;margin:6px 0 0}
  ol.proc li{padding-left:4px}
  h4.proc{margin:14px 0 2px;font-size:14px;color:var(--ink)}
</style>
</head>
<body>

<button class="fab" onclick="openFig()">🗺 SW9 figure</button>

    <p class="sub" style="margin-top:10px">Start &amp; close at <b>LP14</b> = 1095.166 E, 4789.769 N · first bearing
      LP14→Hub 1 = 90°00′00″ · walk LP14 → Hub 1 → Hub 2 → Hub 3 → Hub 4 → back to LP14.</p>
    <div id="figTables"></div>
  </div>
</div>

<div class="wrap">
  <div class="topbar">
    <h1>Survey Computations Trainer <small>GEOM 2120 · Modules 1–8 · practice &amp; step drills</small></h1>
    <div class="hud">
      <span class="chip">Lvl <b class="lv" id="hudLvl">1</b></span>
      <span class="chip">Score <b id="hudScore">0</b></span>
      <span class="chip">Streak <b id="hudStreak">0</b>🔥</span>
      <span class="chip"><span class="hearts" id="hudHearts">❤️❤️❤️</span></span>
    </div>
  </div>
  <div class="xpwrap"><div class="xpbar" id="xpbar"></div></div>
  <div id="screen"></div>
</div>

<script>
/* ===========================================================================
   GEOM 2120 — Survey Computations Trainer (Modules 1–8)
   Content grounded in the L3A/L3B, L4A/L4B, L5A/L5B, L6B and L7 lecture
   worked examples.
   =========================================================================== */

/* ---------- angle helpers ---------- */
function dmsToDeg(d,m,s){const sign=d<0?-1:1;return sign*(Math.abs(d)+(m||0)/60+(s||0)/3600);}
const A=(d,m,s)=>dmsToDeg(d,m,s);                 // shorthand for answer keys
function parseDMS(str){
  const cleaned=String(str).replace(/,/g,'').replace(/[°'"’”]/g,' ').trim();   // strip thousands separators
  if(cleaned==='')return null;
  const p=cleaned.split(/\s+/).map(Number);
  if(p.some(isNaN))return null;
  if(p.length===1)return p[0];                    // decimal degrees / plain number
  const sign=p[0]<0?-1:1;
  return sign*(Math.abs(p[0])+(p[1]||0)/60+(p[2]||0)/3600);
}

/* ===========================================================================
   MODULE CONTENT
   Each module: { key,name,emo,blurb,colour, procs[], mcq[], num[], formulae }
   procs : ordering puzzles      mcq : concept multiple-choice
   num   : numeric generators    formulae : cheat-sheet html
   =========================================================================== */

const M1={
 key:'m1', name:'Module 1 — Units & Conversions', emo:'🔁', cls:'m1b', colour:'var(--m1)',
 blurb:'The fundamentals that quietly cost marks: legal/metric units, and angle units — degrees ↔ gons ↔ radians ↔ DMS, plus interior vs exterior angle sums.',
 procs:[
  {title:'Convert gons → degrees-minutes-seconds',list:[
   'Decimal degrees = gons × 0.9  (since 400 gon = 360°)',
   'Whole degrees D = the integer part',
   'Minutes = (decimal part) × 60; whole minutes M = integer part',
   'Seconds = (leftover) × 60, rounded → assemble D° M′ S″']},
  {title:'Convert degrees → gons',list:[
   'Gons = degrees × (400 ⁄ 360) = degrees × 1.1111…',
   'Keep the required decimal places']},
 ],
 mcq:[
  {q:"A full circle contains how many gons (grads)?",
   opts:["400","360","2π","100"],a:0,why:"By definition 400 gon = one full circle = 360°."},
  {q:"A full circle contains how many radians?",
   opts:["2π","π","400","360"],a:0,why:"One full turn = 2π radians."},
  {q:"A surveyor's EXTERIOR angles (each = 360° − interior) of an n-sided closed traverse sum to…",
   opts:["(n + 2) × 180°","(n − 2) × 180°","n × 180°","360°"],a:0,
   why:"Surveyor's exterior = 360° − interior → Σ = (n + 2) × 180°. (Interior is (n − 2) × 180°.) The “360°” option is the <i>mathematician's</i> exterior angle (180° − interior), which always sums to 360° — a different convention, and the classic trap."},
  {q:"The sum of the INTERIOR angles of an n-sided polygon is…",
   opts:["(n − 2) × 180°","(n + 2) × 180°","360°","n × 90°"],a:0,
   why:"Interior: (n − 2) × 180° — the one used to balance a closed-loop traverse."},
  {q:"To convert gons to degrees you multiply by…",
   opts:["0.9  (= 360 ⁄ 400)","1.1111  (= 400 ⁄ 360)","π ⁄ 180","60"],a:0,
   why:"gon → deg is × 0.9; deg → gon is × 1.1111."},
  {q:"One Gunter's chain equals…",
   opts:["100 links (20.1168 m)","10 links","1000 links (1 km)","66 m"],a:0,
   why:"1 chain = 100 links = 66 ft = 20.1168 m."},
 ],
 num:[
  ()=>({q:"Convert 299° to gons (4 dp). Multiply by 400 ⁄ 360.",
        ans:299*400/360,tol:0.005,unit:' gon',why:'299 × 400⁄360 = <span class="formula">332.2222 gon</span>.'}),
  ()=>({q:"Convert 96°42′49″ to radians (× π ⁄ 180). 6 dp.",
        ans:dmsToDeg(96,42,49)*Math.PI/180,tol:0.0005,unit:' rad',
        why:'96.713611° × π⁄180 = <span class="formula">1.687975 rad</span>.'}),
  ()=>({q:"Convert 365.892284 gon to decimal degrees (× 0.9). 4 dp.",
        ans:365.892284*0.9,tol:0.005,unit:'°',why:'365.892284 × 0.9 = <span class="formula">329.3030°</span> (= 329°18′11″).'}),
  ()=>({q:"Surveyor's exterior-angle sum for a 9-sided closed traverse (each exterior = 360° − interior): (n + 2) × 180°? (degrees)",
        ans:(9+2)*180,tol:0.5,unit:'°',why:'(9 + 2) × 180° = <span class="formula">1980°</span>. Surveyors take each exterior angle as 360° − interior, so they total (n + 2) × 180°. (A mathematician’s exterior angle is 180° − interior — those always sum to 360°. Same polygons, different convention.)'}),
  ()=>({q:"6 chains in metres (1 chain = 20.1168 m). 3 dp.",
        ans:6*20.1168,tol:0.01,unit:' m',why:'6 × 20.1168 = <span class="formula">120.701 m</span>.'}),
 ],
 formulae:`Full circle = 360° = 400 gon = 2π rad<br>
   gon → deg: × 0.9   ·   deg → gon: × 1.1111   ·   deg → rad: × π⁄180<br>
   Interior Σ = (n − 2) × 180°   ·   <b>Exterior Σ = (n + 2) × 180°</b><br>
   1 chain = 100 links = 66 ft = 20.1168 m`
};

const M2={
 key:'m2', name:'Module 2 — Angles & Distances', emo:'🔺', cls:'m2b', colour:'var(--m2)',
 blurb:'Vertical & zenith angles (VA = 90° − ZA), reducing a slope distance to horizontal (HD) and vertical (ΔH), and bearings — Whole Circle ↔ Quadrant.',
 procs:[
  {title:'Reduce a slope distance (with the angle)',list:[
   'If given VA, get the zenith: ZA = 90° − VA (or VA = 90° − ZA)',
   'Horizontal distance HD = SD · sin(ZA)  (= SD · cos VA)',
   'Vertical distance ΔH = SD · cos(ZA)  (= SD · sin VA), keep the sign']},
  {title:'Whole Circle Bearing → Quadrant Bearing',list:[
   'Find the quadrant from the WCB (NE 0–90, SE 90–180, SW 180–270, NW 270–360)',
   'NE: N a E · SE: S (180−a) E · SW: S (a−180) W · NW: N (360−a) W']},
 ],
 mcq:[
  {q:"The vertical angle (VA) and zenith angle (ZA) are related by…",
   opts:["VA = 90° − ZA","VA = ZA − 90°","VA = 180° − ZA","VA = ZA"],a:0,
   why:"Zenith is from straight up, vertical from horizontal; they sum to 90°."},
  {q:"A zenith angle of 98° corresponds to a vertical angle of…",
   opts:["−8° (below horizontal)","+8°","+82°","−82°"],a:0,
   why:"VA = 90° − 98° = −8°; a ZA over 90° means a downhill (negative) sight."},
  {q:"To reduce a slope distance to horizontal: HD =",
   opts:["SD · sin(ZA)  (= SD · cos VA)","SD · cos(ZA)","SD · tan(ZA)","SD ⁄ sin(ZA)"],a:0,
   why:"HD = SD·sin(ZA) = SD·cos(VA)."},
  {q:"The vertical distance from a slope distance is ΔH =",
   opts:["SD · cos(ZA)  (= SD · sin VA)","SD · sin(ZA)","SD · tan(VA)","SD − HD"],a:0,
   why:"ΔH = SD·cos(ZA) = SD·sin(VA); its sign follows the slope."},
  {q:"A Whole Circle Bearing of 210° is in which quadrant?",
   opts:["SW → S 30° W","NE → N 30° E","SE → S 30° E","NW → N 30° W"],a:0,
   why:"180–270° is the SW quadrant; QB = S (210−180) W = S 30° W."},
  {q:"WCB 135° as a quadrant bearing is…",
   opts:["S 45° E","N 45° E","S 45° W","N 45° W"],a:0,
   why:"90–180° is SE; QB = S (180−135) E = S 45° E."},
  {q:"Quadrant bearing N 20° W as a Whole Circle Bearing is…",
   opts:["340°","020°","200°","160°"],a:0,
   why:"NW quadrant: WCB = 360° − 20° = 340°."},
  {q:"A POSITIVE vertical angle (+) means the line of sight is…",
   opts:["above the horizontal (uphill)","below the horizontal","exactly level","vertical"],a:0,
   why:"VA is measured from horizontal, increasing upward (+)."},
 ],
 num:[
  ()=>({q:"ZA = 98°14′59″. Vertical angle VA = 90° − ZA? (d m s, with sign)",
        ans:90-dmsToDeg(98,14,59),tol:5/3600,unit:'',disp:'−8°14′59″',
        why:'90° − 98°14′59″ = <span class="formula">−8°14′59″</span> (downhill).'}),
  ()=>({q:"VA = +42°19′59″. Zenith angle ZA = 90° − VA? (d m s)",
        ans:90-dmsToDeg(42,19,59),tol:5/3600,unit:'',disp:'47°40′01″',
        why:'90° − 42°19′59″ = <span class="formula">47°40′01″</span>.'}),
  ()=>({q:"SD = 198.324 m, VA = +6°17′21″. HD = SD·cos(VA)? (3 dp)",
        ans:198.324*Math.cos(dmsToDeg(6,17,21)*Math.PI/180),tol:0.01,unit:' m',
        why:'198.324 × cos(6°17′21″) = <span class="formula">197.131 m</span>.'}),
  ()=>({q:"SD = 257.566 m, VA = −17°09′59″. ΔH = SD·sin(VA)? (3 dp, signed)",
        ans:-257.566*Math.sin(dmsToDeg(17,9,59)*Math.PI/180),tol:0.01,unit:' m',
        why:'257.566 × sin(−17°09′59″) = <span class="formula">−76.022 m</span>.'}),
  ()=>({q:"WCB = 181°11′19″ is in the SW quadrant. The quadrant-bearing angle (WCB − 180°)? (d m s)",
        ans:dmsToDeg(1,11,19),tol:5/3600,unit:'',disp:'1°11′19″ → S 1°11′19″ W',

/* ---------- game state ---------- */
const S={score:0,streak:0,best:Number(localStorage.gx_best||0),lives:3,xp:0,lvl:1,combo:1};
const XP_PER_LVL=100;
const el=id=>document.getElementById(id);
const screen=el('screen');
let CUR='all';                    // current module key, or 'all'

function curMods(){return CUR==='all'?Object.values(MODULES):[MODULES[CUR]];}
function curName(){return CUR==='all'?'Final Prep · all modules':MODULES[CUR].name;}

function syncHUD(){
  el('hudLvl').textContent=S.lvl; el('hudScore').textContent=S.score;
  el('hudStreak').textContent=S.streak;
  el('hudHearts').textContent='❤️'.repeat(S.lives)+'🖤'.repeat(3-S.lives);
  el('xpbar').style.width=(100*(S.xp%XP_PER_LVL)/XP_PER_LVL)+'%';
}
function toast(m){const t=el('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400);}
function award(base){const pts=Math.round(base*S.combo);S.score+=pts;S.xp+=base;
  const nl=1+Math.floor(S.xp/XP_PER_LVL);if(nl>S.lvl){S.lvl=nl;toast('⭐ Level '+S.lvl+'!');}return pts;}
function rightAnswer(base){S.streak++;if(S.streak>S.best){S.best=S.streak;localStorage.gx_best=S.best;}
  S.combo=1+Math.min(4,Math.floor(S.streak/3))*0.5;const p=award(base);syncHUD();return p;}
function wrongAnswer(){S.streak=0;S.combo=1;S.lives--;syncHUD();return S.lives<=0;}

/* ===========================================================================
   QUESTION GENERATORS  (respect CUR via curMods())
   =========================================================================== */
function makeMC(){
  const bank=[].concat(...curMods().map(m=>m.mcq));
  const item=pick(bank);
  return {type:'mc',q:item.q,why:item.why,opts:shuffle(item.opts.map((t,i)=>({t,ok:i===item.a})))};
}
function makeNum(){
  const gens=[].concat(...curMods().map(m=>m.num));
  const g=pick(gens)(); g.type='num'; return g;
}
function makeSeq(){
  const m=pick(curMods()); const proc=pick(m.procs);
  let list=proc.list, start=0;
  if(list.length>6){const win=5+Math.floor(Math.random()*2);start=Math.floor(Math.random()*(list.length-win));list=list.slice(start,start+win);}
  return {type:'seq',title:proc.title,correct:list.slice(),pool:shuffle(list.map((t,i)=>({t,ord:i})))};
}

let Q=null,queue=null,qIndex=0,MODE=null;

function progress(){const p=el('progress');if(p)p.textContent=queue?`Q ${Math.min(qIndex+1,queue.length)} / ${queue.length}`:'practice';}

function renderMC(q){
  screen.innerHTML=`
   <div class="card">
     <div class="crumb"><a onclick="quit()">◂ Quit</a> · ${curName()}</div>
     <div class="pill q">Spot the Step</div>
     <div class="qtext">${q.q}</div>
     <div class="opts" id="opts"></div>
     <div class="fb" id="fb"></div>
     <div class="footer"><span class="combo" id="combo"></span><span class="tag" id="progress"></span></div>
   </div>`;
  const box=el('opts');
  q.opts.forEach(o=>{
    const b=document.createElement('button');b.className='btn';b.textContent=o.t;
    b.onclick=()=>{
      [...box.children].forEach(c=>c.disabled=true);const fb=el('fb');
      if(o.ok){b.classList.add('correct');const p=rightAnswer(10);
        fb.className='fb show ok';fb.innerHTML=`✅ <b>+${p}</b>. ${q.why}`;showCombo();}
      else{b.classList.add('wrong');
        [...box.children].find(c=>c.textContent===q.opts.find(x=>x.ok).t)?.classList.add('correct');
        fb.className='fb show no';fb.innerHTML=`❌ ${q.why}`;
        if(wrongAnswer())return gameOver();}
      next();
    };
    box.appendChild(b);
  });
  progress();
}

function renderNum(q){
  screen.innerHTML=`
   <div class="card">
     <div class="crumb"><a onclick="quit()">◂ Quit</a> · ${curName()}</div>
     <div class="pill n">Work the Numbers</div>
     <div class="qtext">${q.q}</div>
     <div class="sub">Type a number${q.unit?` (in ${q.unit})`:''}; angles accept “d m s”. Signs matter.</div>
     <div class="num"><input id="ans" type="text" autocomplete="off" inputmode="decimal" placeholder="your answer…">
       <button class="btn primary" id="go">Check</button></div>
     <div class="ghost">Press Enter to submit.</div>
     <div class="fb" id="fb"></div>
     <div class="footer"><span class="combo" id="combo"></span><span class="tag" id="progress"></span></div>
   </div>`;
  const inp=el('ans');inp.focus();
  const submit=()=>{
    const raw=inp.value.trim();if(raw==='')return;
    const v=parseDMS(raw);el('go').disabled=true;inp.disabled=true;const fb=el('fb');
    const ok=v!==null&&Math.abs(v-q.ans)<=q.tol;
    if(ok){const p=rightAnswer(15);fb.className='fb show ok';fb.innerHTML=`✅ <b>+${p}</b>. ${q.why}`;showCombo();}
    else{fb.className='fb show no';fb.innerHTML=`❌ Answer: <b>${q.disp||(q.ans+q.unit)}</b>. ${q.why}`;
      if(wrongAnswer())return gameOver();}
    next();
  };
  el('go').onclick=submit;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
  progress();
}

function renderSeq(q){
  const placed=[];
  const draw=()=>{
    screen.innerHTML=`
     <div class="card">
       <div class="crumb"><a onclick="quit()">◂ Quit</a> · ${curName()}</div>
       <div class="pill s">Sequence It</div>
       <div class="qtext">${q.title}</div>
       <div class="sub">Tap the steps in the order they happen — ${placed.length} of ${q.correct.length} placed.</div>
       <div class="seqans" id="ans"></div><div style="height:10px"></div>
       <div class="seqpool" id="pool"></div>
       <div class="fb" id="fb"></div>
       <div class="footer"><button class="btn" style="width:auto" onclick="renderSeq(Q)">↺ Reset</button>
         <span class="tag" id="progress"></span></div>
     </div>`;
    const ans=el('ans');
    placed.forEach((p,i)=>{const d=document.createElement('div');d.className='seqslot';
      d.innerHTML=`<span class="ix">${i+1}</span><span>${p.t}</span>`;ans.appendChild(d);});
    const pool=el('pool');
    q.pool.filter(p=>!placed.includes(p)).forEach(p=>{
      const b=document.createElement('button');b.className='btn seqitem';b.textContent=p.t;
      b.onclick=()=>{placed.push(p);placed.length===q.correct.length?grade():draw();};
      pool.appendChild(b);});
    progress();
  };
  const grade=()=>{
    const ok=placed.every((p,i)=>p.t===q.correct[i]);const fb=el('fb');
    el('pool').innerHTML='';const ansEl=el('ans');ansEl.innerHTML='';
    placed.forEach((p,i)=>{const good=p.t===q.correct[i];const d=document.createElement('div');
      d.className='seqslot';d.style.borderColor=good?'var(--good)':'var(--bad)';d.style.borderStyle='solid';
      d.innerHTML=`<span class="ix">${i+1}</span><span>${good?'✅':'❌'} ${p.t}</span>`;ansEl.appendChild(d);});
    if(ok){const p=rightAnswer(20);fb.className='fb show ok';fb.innerHTML=`✅ Perfect order. <b>+${p}</b>`;}
    else{fb.className='fb show no';fb.innerHTML='❌ Correct order:<br>'+q.correct.map((t,i)=>`<b>${i+1}.</b> ${t}`).join('<br>');
      if(wrongAnswer()){setTimeout(gameOver,60);return;}}
    setTimeout(next,ok?750:2400);
  };
  draw();
}

function nextQuestion(){
  if(queue){if(qIndex>=queue.length)return win();

  else{Q=MODE==='mc'?makeMC():MODE==='num'?makeNum():makeSeq();}
  Q.type==='mc'?renderMC(Q):Q.type==='num'?renderNum(Q):renderSeq(Q);
}

/* ===========================================================================
   STEP DRILL — Phase 1: Angle Balancing, taught backwards (military style)
   Tiny steps, one screen each, with a worksheet that builds up.
   Backward chaining: Rung 1 = last step only … Rung 5 = whole thing.
   =========================================================================== */
function secToDMS(t){let sg=t<0?'-':'';t=Math.round(Math.abs(t));
  let d=Math.floor(t/3600);t-=d*3600;let m=Math.floor(t/60);let s=t-m*60;
  return `${sg}${d}° ${String(m).padStart(2,'0')}′ ${String(s).padStart(2,'0')}″`;}
const sgn=n=>(n>0?'+':'')+n;
function genAngleProblem(){
  for(;;){
    let misc=(Math.floor(Math.random()*21)-10)*5;          // −50..+50, step 5
    if(misc===0) misc=5;
    const target=540*3600+misc;
    let angs=[],sum=0;
    for(let i=0;i<4;i++){const a=(70+Math.floor(Math.random()*70))*3600+Math.floor(Math.random()*3600);angs.push(a);sum+=a;}
    const fifth=target-sum;
    if(fifth<60*3600||fifth>165*3600) continue;
    angs.push(fifth); angs=shuffle(angs);
    return {angs,misc,corr:-misc/5,sumSec:target};
  }
}
function revealSum(p){
  const parts=p.angs.map(a=>({d:Math.floor(a/3600),m:Math.floor((a%3600)/60),s:a%60}));
  const Ss=parts.reduce((t,x)=>t+x.s,0), cM=Math.floor(Ss/60), sF=Ss%60;
  const Sm=parts.reduce((t,x)=>t+x.m,0)+cM, cD=Math.floor(Sm/60), mF=Sm%60;
  const Sd=parts.reduce((t,x)=>t+x.d,0)+cD;
  return `Seconds: ${parts.map(x=>x.s).join(' + ')} = ${Ss}″ → write ${sF}″, carry ${cM}′.<br>`+
         `Minutes: ${parts.map(x=>x.m).join(' + ')} + ${cM} = ${Sm}′ → write ${mF}′, carry ${cD}°.<br>`+
         `Degrees: ${parts.map(x=>x.d).join(' + ')} + ${cD} = ${Sd}°.<br><b>Σ = ${Sd}° ${String(mF).padStart(2,'0')}′ ${String(sF).padStart(2,'0')}″</b>`;
}
function buildABsteps(p){
  const bal=p.angs[0]+p.corr;
  return [
   {label:'Σ measured angles', val:secToDMS(p.sumSec), ops:['dmsIn','hmsAdd','hmsAdd','hmsAdd','hmsAdd','dmsOut'],
    prompt:'Add the five measured angles shown above (①–⑤) together. Type the total as <b>d m s</b> (e.g. 539 59 30).',
    ans:p.sumSec/3600, tol:4/3600,
    hint:'Add the seconds first (every 60″ carries 1′), then the minutes (every 60′ carries 1°), then the degrees.',
    reveal:revealSum(p)},
   {label:'Should total · n = 5', val:'540°',
    prompt:'What <i>should</i> the angles add up to? You have <b>n = 5</b> angles, so use (n − 2) × 180° = (5 − 2) × 180°. Answer in degrees.',
    ans:540, tol:0.001, hint:'Five corners: (5 − 2) × 180.', reveal:'(5 − 2) × 180° = <b>540°</b>.'},
   {label:'Misclosure', val:sgn(p.misc)+'″',
    prompt:'Misclosure = your sum − 540°. Answer in <b>seconds</b>, with a + or −.',
    ans:p.misc, tol:1, hint:'Subtract 540° from your total — the leftover is just seconds.',
    reveal:`Your sum − 540° = <b>${sgn(p.misc)}″</b>. ${p.misc<0?'Short of 540° → negative.':'Over 540° → positive.'}`},
   {label:'Correction / angle', val:sgn(p.corr)+'″',
    prompt:'Correction for each angle = − misclosure ÷ n. You have <b>n = 5</b> angles (see givens), so divide by 5. Seconds, with sign.',
    ans:p.corr, tol:0.5, hint:'Flip the sign of the misclosure, then divide by n = 5.',
    reveal:`−(${p.misc}) ÷ 5 = <b>${sgn(p.corr)}″</b> added to every angle.`},
   {label:'Balanced angle ①', val:secToDMS(bal), ops:['dmsIn','hmsAdd','dmsOut'],
    prompt:`Apply it. Angle ① was <b>${secToDMS(p.angs[0])}</b>. Add the ${sgn(p.corr)}″ correction and give the balanced value (d m s).`,
    ans:bal/3600, tol:4/3600, hint:'Add the correction to the seconds. If they pass 60, carry 1′. (You would do this same +'+sgn(p.corr).slice(0,1)+' to all five angles.)',
    reveal:`${secToDMS(p.angs[0])} ${p.corr<0?'−':'+'} ${Math.abs(p.corr)}″ = <b>${secToDMS(bal)}</b>.`},
  ];
}
function givensAngles(p){

/* ---- Module 3 drill: Compass (Bowditch) Rule corrections ---- */
function genCompass(){
  const nLegs=4+Math.floor(Math.random()*2);
  let legs=[];
  for(let i=0;i<nLegs-1;i++){const d=50+Math.random()*120, b=Math.random()*360;
    legs.push({d, dE:d*Math.sin(b*Math.PI/180), dN:d*Math.cos(b*Math.PI/180)});}
  const sumE=legs.reduce((t,l)=>t+l.dE,0), sumN=legs.reduce((t,l)=>t+l.dN,0);
  const rs=()=>Math.random()<0.5?-1:1;
  const eEt=rs()*(0.006+Math.random()*0.022), eNt=rs()*(0.006+Math.random()*0.022);
  legs.push({d:Math.hypot(eEt-sumE,eNt-sumN), dE:eEt-sumE, dN:eNt-sumN});
  legs=legs.map(l=>({d:r3(l.d), dE:r3(l.dE), dN:r3(l.dN)}));
  const Ss=r3(legs.reduce((t,l)=>t+l.d,0));
  const eE=r3(legs.reduce((t,l)=>t+l.dE,0)), eN=r3(legs.reduce((t,l)=>t+l.dN,0));
  const focus=Math.floor(Math.random()*legs.length), fl=legs[focus];
  const corrE=-eE*fl.d/Ss, corrN=-eN*fl.d/Ss;
  return {legs, Ss, eE, eN, focus, corrE, corrN, adjE:fl.dE+corrE, adjN:fl.dN+corrN};
}
function buildCompass(p){
  const f=x=>x.toFixed(3), fl=p.legs[p.focus], L=p.focus+1;
  return [
   {label:'East misclosure · eE = ΣΔE', val:f(p.eE)+' m',
    prompt:`Add up the ΔE column (the departures). A closed loop comes back to its start, so they <i>should</i> total <b>0</b> — whatever's left over is the East misclosure <b>eE</b>. (3 dp, signed)`,
    ans:p.eE, tol:0.004, hint:'Just sum every leg\'s ΔE. The little leftover is the misclosure.',
    reveal:`ΣΔE = <b>${f(p.eE)} m</b>.`},
   {label:'North misclosure · eN = ΣΔN', val:f(p.eN)+' m',
    prompt:`Now sum the ΔN column (the latitudes) for the North misclosure <b>eN</b>. (3 dp, signed)`,
    ans:p.eN, tol:0.004, hint:'Sum every leg\'s ΔN.', reveal:`ΣΔN = <b>${f(p.eN)} m</b>.`},
   {label:`Leg ${L} · ΔE correction`, val:f(p.corrE)+' m',
    prompt:`Correct leg <b>${L}</b> in proportion to its length: <b>corr = −eE × (d ⁄ Σs)</b> = −(${f(p.eE)}) × (${f(fl.d)} ⁄ ${f(p.Ss)}). (3 dp, signed)`,
    ans:p.corrE, tol:0.0015,
    hint:'Here\'s the difference from angle balancing: share by LENGTH (d ⁄ Σs), not equally — longer legs absorb more.',
    reveal:`−(${f(p.eE)}) × (${f(fl.d)} ⁄ ${f(p.Ss)}) = <b>${f(p.corrE)} m</b>.`},
   {label:`Leg ${L} · ΔN correction`, val:f(p.corrN)+' m',
    prompt:`Same idea for the North side: <b>corr = −eN × (d ⁄ Σs)</b> = −(${f(p.eN)}) × (${f(fl.d)} ⁄ ${f(p.Ss)}). (3 dp, signed)`,
    ans:p.corrN, tol:0.0015, hint:'Same proportional share, using eN.',
    reveal:`−(${f(p.eN)}) × (${f(fl.d)} ⁄ ${f(p.Ss)}) = <b>${f(p.corrN)} m</b>.`},
   {label:`Leg ${L} · adjusted ΔE`, val:f(p.adjE)+' m',
    prompt:`Apply it: adjusted ΔE = ΔE + correction = ${f(fl.dE)} + (${f(p.corrE)}). (3 dp)`,
    ans:p.adjE, tol:0.0015, hint:'Add the correction onto the original ΔE.',
    reveal:`${f(fl.dE)} + (${f(p.corrE)}) = <b>${f(p.adjE)} m</b>.`},
   {label:`Leg ${L} · adjusted ΔN`, val:f(p.adjN)+' m',

/* ---- Module 2 drill: ZA↔VA + slope-distance reduction ---- */

    <span style="font-size:16px"><b>${p.gon} gon</b></span> &nbsp;·&nbsp; reminder: 400 gon = 360°, so × 0.9.</div>`;
}

/* ---- Cross-cutting drill: signs on errors & corrections ---- */
const sgnNum=x=>(x>=0?'+':'')+x;
const sgnFix=x=>(x>=0?'+':'')+x.toFixed(3);
function genSigns(){
  const ctx=pick(['angular','easting','level']);
  if(ctx==='angular'){
    const n=pick([5,6,7]), trueDeg=(n-2)*180;
    const cv=pick([-1,1])*pick([3,4,5,6,8]);        // per-angle correction (sec)
    const e=-cv*n;                                   // misclosure = opposite of the correction
    const obsSec=trueDeg*3600+e;
    const angSec=(60+Math.floor(Math.random()*80))*3600+Math.floor(Math.random()*3600);
    const adj=angSec+cv;
    return {givens:`<div class="kfoot" style="margin:0 0 12px;background:rgba(74,209,164,.10)"><b>Context — closing a ${n}-angle loop.</b> &nbsp;The rule: <b>correction = − error</b> (always the opposite sign).</div>`,
     steps:[
      {label:'Misclosure (a subtraction)', val:sgnNum(e)+'″',
       prompt:`ΣObs = <b>${secToDMS(obsSec)}</b>, ΣTrue = (${n}−2)×180° = <b>${trueDeg}°</b>. eβ = ΣObs − ΣTrue. Seconds, with sign.`,
       ans:e, tol:1, hint:'Observed minus true. Over the target ⇒ +, under ⇒ −.',
       reveal:`${secToDMS(obsSec)} − ${trueDeg}° = <b>${sgnNum(e)}″</b>.`},
      {label:'Flip it → correction', val:sgnNum(-e)+'″',
       prompt:`The correction is the <b>opposite</b> of the error: total correction = −eβ. Seconds, with sign.`,
       ans:-e, tol:1, hint:`Flip the sign of the misclosure: −(${sgnNum(e)}).`,
       reveal:`−(${sgnNum(e)}) = <b>${sgnNum(-e)}″</b> &nbsp;(= ${sgnNum(cv)}″ per angle).`},
      {label:'Sign-aware apply', val:secToDMS(adj),
       prompt:`One angle reads <b>${secToDMS(angSec)}</b>; its correction is <b>${sgnNum(cv)}″</b>. Adjusted = angle + correction. d m s.`,
       ans:adj/3600, tol:4/3600, hint:'Add the correction; a negative one you subtract — mind the 60″ borrow.',
       reveal:`${secToDMS(angSec)} ${cv<0?'−':'+'} ${Math.abs(cv)}″ = <b>${secToDMS(adj)}</b>.`},
    ]};
  }
  const isE=ctx==='easting';
  const sumv=r3(pick([-1,1])*(0.006+Math.random()*0.03));
  const cv=r3(-Math.sign(sumv)*(0.002+Math.random()*0.006));
  const comp=r3(pick([-1,1])*(30+Math.random()*120));
  const adj=r3(comp+cv);
  const el=isE?'ΔE':'ΔH', sumName=isE?'ΣΔE':'ΣΔH', what=isE?'departures':'height differences';
  return {givens:`<div class="kfoot" style="margin:0 0 12px;background:rgba(74,209,164,.10)"><b>Context — ${isE?'closing the eastings of a loop traverse':'closing a levelling loop'}.</b> &nbsp;The rule: <b>correction = − error</b> (opposite sign).</div>`,
   steps:[
    {label:`Misclosure (${sumName})`, val:sgnFix(sumv)+' m',
     prompt:`The ${what} sum to <b>${sgnFix(sumv)} m</b>. A closed loop should total <b>0</b>, so the misclosure = sum − 0. Metres, 3 dp, with sign.`,
     ans:sumv, tol:0.0006, hint:'Loop target is zero, so the misclosure IS the sum — keep its sign.',
     reveal:`${sgnFix(sumv)} − 0 = <b>${sgnFix(sumv)} m</b>.`},
    {label:'Flip it → correction', val:sgnFix(-sumv)+' m',
     prompt:`Corrections <b>oppose</b> the error: total correction = − misclosure. Metres, 3 dp, with sign.`,
     ans:-sumv, tol:0.0006, hint:`Flip the sign: −(${sgnFix(sumv)}).`,
     reveal:`−(${sgnFix(sumv)}) = <b>${sgnFix(-sumv)} m</b> &nbsp;(every ${el} correction takes this opposite sign).`},
    {label:'Sign-aware apply', val:sgnFix(adj)+' m',
     prompt:`One leg's ${el} = <b>${sgnFix(comp)} m</b>; its correction is <b>${sgnFix(cv)} m</b>. Adjusted ${el} = ${el} + correction. Metres, 3 dp.`,
     ans:adj, tol:0.0015, hint:'Add the signed correction; a negative one makes it smaller.',
     reveal:`${sgnFix(comp)} ${cv<0?'−':'+'} ${Math.abs(cv).toFixed(3)} = <b>${sgnFix(adj)} m</b>.`},
  ]};
}

/* ===== Module 4, 5, 6 drills ===== */
const brgOf=(dE,dN)=>((Math.atan2(dE,dN)*180/Math.PI)+360)%360;   // dE,dN → WCB 0–360
const RAD=Math.PI/180;
function vAngleAt(P,U,V){const ax=U.E-P.E,ay=U.N-P.N,bx=V.E-P.E,by=V.N-P.N;
  return Math.acos((ax*bx+ay*by)/(Math.hypot(ax,ay)*Math.hypot(bx,by)))/RAD;}
const dist2=(p,q)=>Math.hypot(q.E-p.E,q.N-p.N);

/* M4 · swing angle (traverse between two known points) */
function genSwing(){
  const Es=r3(1000+Math.random()*300), Ns=r3(1000+Math.random()*300);
  const aT=Math.random()*360, s=r3(200+Math.random()*300);
  const En=r3(Es+s*Math.sin(aT*RAD)), Nn=r3(Ns+s*Math.cos(aT*RAD));
  const delta=Math.round((pick([-1,1])*(3+Math.random()*12))*3600)/3600;
  const aA=((aT+delta)%360+360)%360;
  const SE=r3(s*Math.sin(aA*RAD)), SN=r3(s*Math.cos(aA*RAD));
  const trueB=brgOf(En-Es,Nn-Ns), assumedB=brgOf(SE,SN);
  let sw=assumedB-trueB; if(sw>180)sw-=360; if(sw<-180)sw+=360;
  return {Es,Ns,En,Nn,SE,SN,trueB,assumedB,sw};
}
function buildSwing(p){const f=x=>x.toFixed(3);return [
  {label:'Assumed bearing (start → end)', val:dms2(p.assumedB),
   prompt:`From the assumed-bearing run, the sums are ΣΔE = <b>${f(p.SE)}</b>, ΣΔN = <b>${f(p.SN)}</b>. Assumed bearing = tan⁻¹(ΣΔE ⁄ ΣΔN), placed in the right quadrant. Answer d m s.`,
   ans:p.assumedB, tol:0.01, hint:'tan⁻¹(ΔE⁄ΔN); if ΔN is negative add 180°, if only ΔE is negative add 360°.',
   reveal:`tan⁻¹(${f(p.SE)} ⁄ ${f(p.SN)}) → <b>${dms2(p.assumedB)}</b>.`},
  {label:'True bearing (inverse of knowns)', val:dms2(p.trueB),
   prompt:`Inverse between the known coordinates: true bearing = tan⁻¹((E_end − E_start) ⁄ (N_end − N_start)). Answer d m s.`,
   ans:p.trueB, tol:0.01, hint:'Same inverse, using the known start and end coordinates.',
   reveal:`tan⁻¹(${f(p.En-p.Es)} ⁄ ${f(p.Nn-p.Ns)}) → <b>${dms2(p.trueB)}</b>.`},
  {label:'Swing angle', val:dms2signed(p.sw),
   prompt:`The swing rotates the assumed traverse onto the true line: <b>swing = assumed − true</b>. Answer d m s, with sign.`,
   ans:p.sw, tol:0.01, hint:'Subtract the true bearing from the assumed bearing. Applied to every leg bearing (angles unchanged).',
   reveal:`${dms2(p.assumedB)} − ${dms2(p.trueB)} = <b>${dms2signed(p.sw)}</b>.`},
]; }
function givensSwing(p){const f=x=>x.toFixed(3);
  return `<div class="kfoot" style="margin:0 0 12px;background:rgba(91,156,255,.12)">
   <b>What you're given</b> — closed traverse between two known points, run on an assumed bearing:<br>
   <span style="line-height:1.9">Start = <b>${f(p.Es)} E, ${f(p.Ns)} N</b> &nbsp; End = <b>${f(p.En)} E, ${f(p.Nn)} N</b><br>
   Assumed-run sums: ΣΔE = <b>${f(p.SE)} m</b>, ΣΔN = <b>${f(p.SN)} m</b></span></div>`;
}

/* M4 · single distance blunder */
function genBlunder(){
  const b=Math.random()*360, blunder=r3(4+Math.random()*11);
  const eE=r3(blunder*Math.sin(b*RAD)), eN=r3(blunder*Math.cos(b*RAD));
  const er=Math.hypot(eE,eN), errB=brgOf(eE,eN);
  const nLegs=5, culprit=Math.floor(Math.random()*nLegs), legs=[];
  for(let i=0;i<nLegs;i++){let lb=i===culprit?(Math.random()<0.5?errB:(errB+180)%360):Math.random()*360;
    legs.push({brg:Math.round(lb*3600)/3600,d:r3(80+Math.random()*150)});}
  return {eE,eN,er,errB,legs,culprit};
}
function buildBlunder(p){const f=x=>x.toFixed(3);return [
  {label:'Size of the relative error', val:f(p.er)+' m',
   prompt:`Angles check out but the position misses by eE = <b>${f(p.eE)}</b>, eN = <b>${f(p.eN)}</b>. Its length er = √(eE² + eN²). Metres, 3 dp.`,
   ans:p.er, tol:0.02, hint:'√(eE² + eN²) — this ≈ the size of the distance blunder.',
   reveal:`√(${f(p.eE)}² + ${f(p.eN)}²) = <b>${f(p.er)} m</b>.`},
  {label:'Bearing of the error', val:dms2(p.errB),
   prompt:`Bearing of the relative error = tan⁻¹(eE ⁄ eN), in the right quadrant. Answer d m s.`,
   ans:p.errB, tol:0.02, hint:'Same inverse as a bearing; mind the quadrant from the signs of eE and eN.',
   reveal:`tan⁻¹(${f(p.eE)} ⁄ ${f(p.eN)}) → <b>${dms2(p.errB)}</b>.`},
  {label:'Which leg is the blunder?', val:'leg '+(p.culprit+1),
   prompt:`Compare that bearing to each leg below. The blunder is the leg whose bearing matches it (or is exactly 180° opposite). Enter the leg number.`,
   ans:p.culprit+1, tol:0.1, hint:'A distance error only shifts you along that leg, so the error bearing lines up with the bad leg (± 180°).',
   reveal:`Leg <b>${p.culprit+1}</b> (bearing ${dms2(p.legs[p.culprit].brg)}) matches the error bearing — re-measure it.`},

  return `<div class="kfoot" style="margin:0 0 12px;background:rgba(91,156,255,.12)">
   <b>What you're given</b> — positional misclosure eE = <b>${f(p.eE)} m</b>, eN = <b>${f(p.eN)} m</b>; the legs:
   <table class="mini" style="margin-top:6px"><tr><th>Leg</th><th>Bearing</th><th>Dist</th></tr>${rows}</table></div>`;
}

/* M5 · three-point resection */
function genResection(){
  for(let tries=0;tries<200;tries++){
    const P={E:r3(1000+Math.random()*200),N:r3(1000+Math.random()*200)};
    const bA=Math.random()*360, Xd=28+Math.random()*44, Yd=28+Math.random()*44;   // B angularly between A and C
    const ptAt=ang=>{const d=200+Math.random()*260;return {E:r3(P.E+d*Math.sin(ang*RAD)),N:r3(P.N+d*Math.cos(ang*RAD))};};
    const A=ptAt(bA), B=ptAt(bA+Xd), C=ptAt(bA+Xd+Yd);
    const X=vAngleAt(P,A,B), Y=vAngleAt(P,B,C);
    const Atrue=vAngleAt(A,B,P), Ctrue=vAngleAt(C,B,P);
    const angB=360-(X+Y)-(Atrue+Ctrue);               // identity → hub lands exactly; = triangle angle for this standard config
    const S=360-(X+Y+angB);
    if(X<25||X>80||Y<25||Y>80||angB<55||angB>160||Atrue<20||Atrue>85||Ctrue<20||Ctrue>85) continue;
    const c=dist2(A,B), a=dist2(B,C);
    const k=(a*Math.sin(X*RAD))/(c*Math.sin(Y*RAD));
    const Cang=Math.atan(Math.sin(S*RAD)/(k+Math.cos(S*RAD)))/RAD, Aang=S-Cang;
    const B1=180-(X+Aang), B2=180-(Y+Cang);
    const AP=c*Math.sin(B1*RAD)/Math.sin(X*RAD), CP=a*Math.sin(B2*RAD)/Math.sin(Y*RAD);
    return {c:r3(c),a:r3(a),angB,X,Y,S,k,Aang,Cang,B1,B2,AP,CP,A,B,C,P};
  }
  return genResection();
}
function buildResection(p){const f=x=>x.toFixed(3);return [
  {label:'(A + C) = 360° − (X + Y + B)', val:dms2(p.S),
   prompt:`Sum of the unknown angles: <b>(A + C) = 360° − (X + Y + B)</b> = 360° − (${dms2(p.X)} + ${dms2(p.Y)} + ${dms2(p.angB)}). Answer d m s.`,
   ans:p.S, tol:0.02, hint:'Add the two observed angles and angle B, subtract from 360°.',
   reveal:`360° − (${dms2(p.X)} + ${dms2(p.Y)} + ${dms2(p.angB)}) = <b>${dms2(p.S)}</b>.`},
  {label:'Constant k = (a·sinX) ⁄ (c·sinY)', val:p.k.toFixed(6),
   prompt:`<b>k = (a · sin X) ⁄ (c · sin Y)</b> = (${f(p.a)} × sin ${dms2(p.X)}) ⁄ (${f(p.c)} × sin ${dms2(p.Y)}). 6 dp.`,
   ans:p.k, tol:0.0005, hint:'k = sin A ⁄ sin C; it tells you how A and C split.',
   reveal:`(${f(p.a)}·sin ${dms2(p.X)}) ⁄ (${f(p.c)}·sin ${dms2(p.Y)}) = <b>${p.k.toFixed(6)}</b>.`},
  {label:'Angle C = tan⁻¹[ sinS ⁄ (k + cosS) ]', val:dms2(p.Cang),
   prompt:`With S = (A+C) and k known: <b>C = tan⁻¹[ sin S ⁄ (k + cos S) ]</b>, S = ${dms2(p.S)}. Answer d m s.`,
   ans:p.Cang, tol:0.02, hint:'Plug S and k straight in; the result is angle C.',
   reveal:`tan⁻¹[ sin ${dms2(p.S)} ⁄ (${p.k.toFixed(4)} + cos ${dms2(p.S)}) ] = <b>${dms2(p.Cang)}</b>.`},
  {label:'Angle A = (A + C) − C', val:dms2(p.Aang),
   prompt:`<b>A = (A + C) − C</b> = ${dms2(p.S)} − ${dms2(p.Cang)}. Answer d m s.`,
   ans:p.Aang, tol:0.02, hint:'Just subtract C from the sum you found in step 1.',
   reveal:`${dms2(p.S)} − ${dms2(p.Cang)} = <b>${dms2(p.Aang)}</b>.`},
  {label:'B1 = 180° − (X + A)', val:dms2(p.B1),
   prompt:`Triangle angle at B (A side): <b>B1 = 180° − (X + A)</b> = 180° − (${dms2(p.X)} + ${dms2(p.Aang)}). Answer d m s.`,
   ans:p.B1, tol:0.02, hint:'180° minus the other two angles of that triangle.',
   reveal:`180° − (${dms2(p.X)} + ${dms2(p.Aang)}) = <b>${dms2(p.B1)}</b>.`},
  {label:'B2 = 180° − (Y + C)', val:dms2(p.B2),
   prompt:`Other triangle: <b>B2 = 180° − (Y + C)</b> = 180° − (${dms2(p.Y)} + ${dms2(p.Cang)}). Answer d m s.`,
   ans:p.B2, tol:0.02, hint:'Same idea with Y and C.',
   reveal:`180° − (${dms2(p.Y)} + ${dms2(p.Cang)}) = <b>${dms2(p.B2)}</b>.`},
  {label:'AP = c·sinB1 ⁄ sinX', val:f(p.AP)+' m',
   prompt:`Sine law on triangle A-B-P: <b>AP = c · sin B1 ⁄ sin X</b> = ${f(p.c)} × sin ${dms2(p.B1)} ⁄ sin ${dms2(p.X)}. Metres, 3 dp.`,
   ans:p.AP, tol:0.02, hint:'Distance from known point A to the hub.',
   reveal:`${f(p.c)}·sin ${dms2(p.B1)} ⁄ sin ${dms2(p.X)} = <b>${f(p.AP)} m</b>.`},
  {label:'CP = a·sinB2 ⁄ sinY', val:f(p.CP)+' m',
   prompt:`And <b>CP = a · sin B2 ⁄ sin Y</b> = ${f(p.a)} × sin ${dms2(p.B2)} ⁄ sin ${dms2(p.Y)}. Metres, 3 dp. (AP and CP then give the hub coordinates — and the check.)`,
   ans:p.CP, tol:0.02, hint:'Distance from known point C to the hub.',
   reveal:`${f(p.a)}·sin ${dms2(p.B2)} ⁄ sin ${dms2(p.Y)} = <b>${f(p.CP)} m</b>.`},
]; }
function givensResection(p){const f=x=>x.toFixed(3);
  return `<div class="kfoot" style="margin:0 0 12px;background:rgba(192,139,255,.12)">
   <b>What you're given</b> — angles X, Y observed at the unknown hub to three known points (A, B central, C):<br>
   <span style="line-height:1.9">X = <b>${dms2(p.X)}</b> &nbsp; Y = <b>${dms2(p.Y)}</b><br>
   From the known coordinates (by inverse): c = AB = <b>${f(p.c)} m</b>, &nbsp;a = BC = <b>${f(p.a)} m</b>, &nbsp;angle B = <b>${dms2(p.angB)}</b></span></div>`;
}

/* M5 · missing bearing & distance of one line */
function genMissing(){
  const legs=[]; for(let i=0;i<4;i++){const b=Math.random()*360,d=r3(60+Math.random()*180);
    legs.push({brg:Math.round(b*3600)/3600,d,dE:r3(d*Math.sin(b*RAD)),dN:r3(d*Math.cos(b*RAD))});}
  const sE=r3(legs.reduce((t,l)=>t+l.dE,0)), sN=r3(legs.reduce((t,l)=>t+l.dN,0));
  const mE=r3(-sE), mN=r3(-sN), mBrg=brgOf(mE,mN), mDist=Math.hypot(mE,mN);
  return {legs,sE,sN,mE,mN,mBrg,mDist};
}

  {label:'Σ ΔE of the known legs', val:sgnFix(p.sE)+' m',

   ans:p.mE, tol:0.004, hint:'Closure: the missing leg makes the totals zero, so flip the sum.', reveal:`−(${sgnFix(p.sE)}) = <b>${sgnFix(p.mE)} m</b>.`},
  {label:'Missing ΔN = −ΣΔN', val:sgnFix(p.mN)+' m',

  {label:'Missing bearing = tan⁻¹(ΔE ⁄ ΔN)', val:dms2(p.mBrg),

  {label:'Missing distance = √(ΔE² + ΔN²)', val:f(p.mDist)+' m',

]; }

  const rows=p.legs.map((l,i)=>`<tr><td>${i+1}</td><td style="text-align:right">${dms2(l.brg)}</td><td style="text-align:right">${f(l.d)}</td><td style="text-align:right">${sgnFix(l.dE)}</td><td style="text-align:right">${sgnFix(l.dN)}</td></tr>`).join('');

/* M6 · loop levelling closure */
function genLoopLevel(){
  const n=4+Math.floor(Math.random()*2), legs=[];
  for(let i=0;i<n-1;i++)legs.push({dH:r3(pick([-1,1])*(0.5+Math.random()*6)),HD:r3(40+Math.random()*120)});
  const sumH=legs.reduce((t,l)=>t+l.dH,0), mis=r3(pick([-1,1])*(0.004+Math.random()*0.02));
  legs.push({dH:r3(mis-sumH),HD:r3(40+Math.random()*120)});
  const SH=r3(legs.reduce((t,l)=>t+l.dH,0)), SHD=r3(legs.reduce((t,l)=>t+l.HD,0));
  const focus=Math.floor(Math.random()*legs.length), fl=legs[focus];
  const corr=-SH*fl.HD/SHD, adj=fl.dH+corr, elevA=r3(80+Math.random()*200), elevB=r3(elevA+adj);
  return {legs,SH,SHD,focus,corr,adj,elevA,elevB};
}
function buildLoopLevel(p){const f=x=>x.toFixed(3), fl=p.legs[p.focus], L=p.focus+1;return [
  {label:'Misclosure ΣΔH', val:sgnFix(p.SH)+' m',
   prompt:`Add the ΔH column. A closed level loop should total <b>0</b>, so the sum is the misclosure. Metres, 3 dp, signed.`,
   ans:p.SH, tol:0.0015, hint:'Sum every leg\'s height difference; the leftover is the misclosure.', reveal:`ΣΔH = <b>${sgnFix(p.SH)} m</b>.`},
  {label:'Σ HD', val:f(p.SHD)+' m',
   prompt:`Add the horizontal-distance column. Metres, 3 dp.`,
   ans:p.SHD, tol:0.01, hint:'Total length the level run covered.', reveal:`ΣHD = <b>${f(p.SHD)} m</b>.`},

/* M7 · area by coordinates (Sum & Difference cross-multiplication) */
function genCoordArea(){
  for(;;){
    const E0=200+Math.random()*200, N0=200+Math.random()*200;
    let angs=[]; for(let i=0;i<4;i++)angs.push(Math.random()*360);
    angs.sort((a,b)=>a-b);
    let ok=true;
    for(let i=0;i<4;i++){const gap=(angs[(i+1)%4]-angs[i]+360)%360;if(gap<45)ok=false;}
    if(!ok)continue;
    const pts=angs.map(a=>{const d=60+Math.random()*120;
      return {E:r3(E0+d*Math.sin(a*RAD)),N:r3(N0+d*Math.cos(a*RAD))};});
    let dashed=0,solid=0;
    for(let i=0;i<4;i++){const j=(i+1)%4;dashed+=pts[i].E*pts[j].N;solid+=pts[i].N*pts[j].E;}
    const twoA=dashed-solid, area=Math.abs(twoA)/2, ha=area/10000;
    if(area<4000)continue;
    return {pts,dashed,solid,twoA,area,ha};
  }
}

/* M7 · offsets from a baseline: trapezoid rule vs Simpson's one-third rule */
function genOffsets(){
  const b=pick([5,10,15,20]), base=b*6;
  const hs=[]; for(let i=0;i<7;i++)hs.push(Math.round((2+Math.random()*10)*100)/100);
  const trapBracket=r3(hs[0]/2+hs[6]/2+hs[1]+hs[2]+hs[3]+hs[4]+hs[5]);
  const trap=r3(b*trapBracket);
  const ends=r3(hs[0]+hs[6]), odds=r3(hs[2]+hs[4]), evens=r3(hs[1]+hs[3]+hs[5]);
  const simpBracket=r3(ends+2*odds+4*evens);
  const simpson=r3(b/3*simpBracket);
  return {b,base,hs,trapBracket,trap,ends,odds,evens,simpBracket,simpson};
}

   hint:'Divide by the number of INTERVALS — offsets − 1 = 6 — not by the number of offsets. (A7 pattern: b = baseline 2-3 ÷ 6.)',

  {label:'Trapezoid bracket · ½h₁ + h₂…h₆ + ½h₇', val:p.trapBracket.toFixed(2)+' m',

/* M7 · subdivision: parcel by coordinates minus a Heron triangle (the A7 Q2 chain) */
function genSubdivide(){
  for(;;){
    const cE=5000+Math.random()*800, cN=3800+Math.random()*800;
    let angs=[]; for(let i=0;i<5;i++)angs.push(Math.random()*360);
    angs.sort((a,b)=>a-b);
    let ok=true;
    for(let i=0;i<5;i++){const gap=(angs[(i+1)%5]-angs[i]+360)%360;if(gap<30||gap>110)ok=false;}
    if(!ok)continue;
    const pts=angs.map(a=>{const d=150+Math.random()*100;
      return {E:r3(cE+d*Math.sin(a*RAD)),N:r3(cN+d*Math.cos(a*RAD))};});
    let dsh=0,sld=0;
    for(let i=0;i<5;i++){const j=(i+1)%5;dsh+=pts[i].E*pts[j].N;sld+=pts[i].N*pts[j].E;}
    const comb=Math.round(Math.abs(dsh-sld)/2*100)/100;
    const P=pts[0],Q=pts[4];                                 // stations 100 & 104 — the closing edge
    const diag=Math.hypot(Q.E-P.E,Q.N-P.N);
    const mx=(P.E+Q.E)/2,my=(P.N+Q.N)/2;
    let ux=(Q.N-P.N)/diag, uy=-(Q.E-P.E)/diag;               // unit normal to the edge
    if((mx-cE)*ux+(my-cN)*uy<0){ux=-ux;uy=-uy;}              // point it AWAY from the parcel
    const off=40+Math.random()*90, slide=(Math.random()-0.5)*0.5*diag;
    const X={E:mx+ux*off+(Q.E-P.E)/diag*slide, N:my+uy*off+(Q.N-P.N)/diag*slide};
    const d1=r3(Math.hypot(X.E-P.E,X.N-P.N)), d2=r3(Math.hypot(X.E-Q.E,X.N-Q.N));
    const s=(diag+d1+d2)/2;
    const tri=Math.sqrt(s*(s-diag)*(s-d1)*(s-d2));
    if(!(tri>800)||tri>comb*0.35)continue;
    const lotA=comb-tri, ha=lotA/10000;
    return {pts,comb,P,Q,X,diag,d1,d2,s,tri,lotA,ha};
  }
}

/* ---- Module 8 drills: horizontal curves ---- */
const fmtCh=ch=>`${Math.floor(ch/1000)}+${(ch-Math.floor(ch/1000)*1000).toFixed(3).padStart(7,'0')}`;
/* M8 · curve elements + BC/EC chainage (the L7 example chain) */
function genCurve(){
  const R=pick([150,200,250,300,350,400,500]);
  const delta=((20*3600)+Math.floor(Math.random()*(70*3600)))/3600;          // Δ 20–90°, whole sec
  const back=Math.floor(Math.random()*360*3600)/3600;
  const fwd=r3((back+delta)%360);
  const chPI=r3(800+Math.random()*1500);
  const T=R*Math.tan(delta/2*RAD);
  const chBC=chPI-T;
  const L=2*Math.PI*R*delta/360;
  const chEC=chBC+L;
  const C=2*R*Math.sin(delta/2*RAD);
  return {R,delta,back,fwd,chPI,T,chBC,L,chEC,C};
}

   ans:p.delta, tol:3/3600,

  {label:'Chainage of BC = chainage of PI − T', val:fmtCh(p.chBC),
   prompt:`The PI is at chainage <b>${fmtCh(p.chPI)}</b> m. Step BACK along the tangent: chainage of BC = ${f(p.chPI)} − ${f(p.T)}. Answer in metres (e.g. 143.499).`,
   ans:p.chBC, tol:0.02,

   reveal:`${f(p.chPI)} − ${f(p.T)} = <b>${f(p.chBC)} m → ${fmtCh(p.chBC)}</b>.`},
  {label:'Curve length · L = 2πR(Δ⁄360)', val:f(p.L)+' m',
   prompt:`<b>L = 2πR × (Δ⁄360)</b> = 2π × ${p.R} × (${(p.delta).toFixed(6)}° ⁄ 360). Metres, 3 dp. (Δ in DECIMAL degrees here.)`,
   ans:p.L, tol:0.02,
   hint:'The curve is Δ⁄360 of a full circle of circumference 2πR. Convert Δ to decimal degrees first.',
   reveal:`2π × ${p.R} × ${(p.delta/360).toFixed(6)} = <b>${f(p.L)} m</b>.`},
  {label:'Chainage of EC = chainage of BC + L', val:fmtCh(p.chEC),
   prompt:`Stationing follows the ARC: chainage of EC = ${f(p.chBC)} + ${f(p.L)}. Answer in metres.`,
   ans:p.chEC, tol:0.03,
   hint:'Add the curve length to the BC chainage — never go via the PI (that path is longer).',
   reveal:`${f(p.chBC)} + ${f(p.L)} = <b>${f(p.chEC)} m → ${fmtCh(p.chEC)}</b>.`},
  {label:'Long chord · C = 2R·sin(Δ⁄2)', val:f(p.C)+' m',

]; }

/* M8 · deflection angle + chord to an even station */
function genDefl(){
  for(;;){
    const R=pick([150,200,250,300,350,400]);
    const delta=((25*3600)+Math.floor(Math.random()*(60*3600)))/3600;        // Δ 25–85°
    const tang=Math.floor(Math.random()*360*3600)/3600;
    const chBC=r3(150+Math.random()*800);
    const L=2*Math.PI*R*delta/360;
    const interval=pick([50,100]);
    const first=Math.ceil(chBC/interval)*interval;
    if(first>=chBC+L-5||first-chBC<2) continue;      // even station must land on the curve
    const l=first-chBC;
    const defl=90*l/(Math.PI*R);
    const chord=2*R*Math.sin(defl*RAD);
    const brg=(tang+defl)%360;
    return {R,delta,tang,chBC,L,interval,first,l,defl,chord,brg,deflEC:delta/2};
  }
}
function buildDefl(p){const f=x=>x.toFixed(3);return [
  {label:`First even ${p.interval} m station after the BC`, val:fmtCh(p.first),
   prompt:`The BC sits at <b>${fmtCh(p.chBC)}</b>. Stakes go in at every even ${p.interval} m of chainage — what is the FIRST one on the curve? Answer in metres (e.g. ${p.interval===50?'350':'200'}).`,
   ans:p.first, tol:0.01,
   hint:`Round the BC chainage UP to the next multiple of ${p.interval}.`,
   reveal:`Next multiple of ${p.interval} after ${f(p.chBC)} = <b>${f(p.first)} m → ${fmtCh(p.first)}</b>.`},
  {label:'Arc length from the BC · l', val:f(p.l)+' m',
   prompt:`Deflections need the ARC run from the BC: <b>l = station − chainage of BC</b> = ${f(p.first)} − ${f(p.chBC)}. Metres, 3 dp.`,
   ans:p.l, tol:0.01,
   hint:'A simple subtraction — chainage is measured along the alignment, so this difference IS the arc.',
   reveal:`${f(p.first)} − ${f(p.chBC)} = <b>${f(p.l)} m</b>.`},
  {label:'Deflection angle · δ = 90·l ⁄ (πR)', val:dms2(p.defl),
   prompt:`<b>δ = 90 × l ⁄ (π × R)</b> = 90 × ${f(p.l)} ⁄ (π × ${p.R}) — half the central angle the arc subtends. Answer d m s.`,
   ans:p.defl, tol:3/3600,
   hint:'The deflection from the tangent is HALF the angle at the centre: (l⁄R in degrees) ⁄ 2 = 90l⁄πR.',
   reveal:`90 × ${f(p.l)} ⁄ (π × ${p.R}) = ${p.defl.toFixed(6)}° = <b>${dms2(p.defl)}</b>.`},
  {label:'Chord from the BC · c = 2R·sin δ', val:f(p.chord)+' m',
   prompt:`The tape distance to pull from the BC: <b>c = 2R · sin δ</b> = 2 × ${p.R} × sin(${dms2(p.defl)}). Metres, 3 dp.`,
   ans:p.chord, tol:0.01,
   hint:'Any chord = 2R sin(its deflection angle). Slightly shorter than the arc.',
   reveal:`2 × ${p.R} × sin ${dms2(p.defl)} = <b>${f(p.chord)} m</b>.`},
  {label:'Bearing BC → station', val:dms2(p.brg),
   prompt:`The curve turns RIGHT, so add the deflection to the tangent bearing: <b>brg = ${dms2(p.tang)} + ${dms2(p.defl)}</b> (mod 360°). Answer d m s.`,
   ans:p.brg, tol:3/3600,
   hint:'Right curve ⇒ deflection is positive (clockwise). A LEFT curve would subtract it.',
   reveal:`${dms2(p.tang)} + ${dms2(p.defl)} = <b>${dms2(p.brg)}</b>.`},
  {label:'Check · deflection at the EC = Δ⁄2', val:dms2(p.deflEC),
   prompt:`Sanity check for the whole table: the deflection to the EC must equal <b>Δ⁄2</b> = ${dms2(p.delta)} ⁄ 2. Answer d m s.`,
   ans:p.deflEC, tol:2/3600,
   hint:'Half the delta angle — if the last row of your layout table shows anything else, something slipped.',
   reveal:`${dms2(p.delta)} ⁄ 2 = <b>${dms2(p.deflEC)}</b> (and its chord would be the long chord C).`},
]; }
function givensDefl(p){const f=x=>x.toFixed(3);
  return `<div class="kfoot" style="margin:0 0 12px;background:rgba(255,143,198,.12)">
   <b>What you're given</b> — setting out a right-hand curve by deflection angles from the BC:<br>
   <span style="line-height:1.9">R = <b>${p.R} m</b> &nbsp;·&nbsp; Δ = <b>${dms2(p.delta)}</b> &nbsp;·&nbsp; curve length L = <b>${f(p.L)} m</b><br>
   Chainage of BC = <b>${fmtCh(p.chBC)}</b> (${f(p.chBC)} m) &nbsp;·&nbsp; tangent bearing at the BC = <b>${dms2(p.tang)}</b><br>
   Stakes at every even <b>${p.interval} m</b> of chainage</span></div>`;
}

/* ---- Calculator keypress-cost model (PILOT — m2_reduce only) ----------------
   Each value = OVERHEAD presses for one primitive op; digit entry is excluded
   (it costs the same on every machine, so it cancels out of the comparison).
   Draft numbers — calibrate against the real calculators, then expand columns
   (e.g. a programmed HP-50g). A step opts in by carrying an `ops:[...]` array. */
const CALCS=[
  {key:'cw',    name:'Casio fx-991CW'},
  {key:'hp35',  name:'HP-35s'},
  {key:'hp50',  name:'HP-50g (RPN)'},
  {key:'db48x', name:'DB48X (RPL)'},
  {key:'wp34s', name:'WP-34S'},
];
const CALC_COSTS={
  // dmsIn = key a d°m′s″ angle AND make it usable for trig.
  //   CW:     3×(Shift +) entry, native sexagesimal after          = 6
  //           ⚠ PIVOTAL / least-certain cell: assumes °′″ is Shift+'+' (2 each).
  //           If the CW has a single-key °′″, this drops to 3 and the CW stops
  //           being the slowest (legacy 50g takes that spot). Verify on machine.
  //   HP-35s: type D.MMSSss free, one shifted →HR before trig      = 2
  //   HP-50g: free HH.MMSS entry, HMS→ buried in TIME menu (~4)
  //   DB48X:  inline DMS via 2 extra '.' presses, native _dms unit,
  //           trig works directly — no convert step                = 2
  //   WP-34S: type H.MMSS free, then H.d (f+key) → decimal before trig = 2.
  //           Result back to DMS via f H.MS (2). Both manual-verified
  //           (Owner's Manual 3.1, IOP p.88). Its real edge is native
  //           H.MS+/H.MS− angle ARITHMETIC (h X.FCN) — adds DMS angles with
  //           no decimal round-trip; shows up in m3_compass, not this drill.
  dmsIn: {cw:6, hp35:2, hp50:4, db48x:2, wp34s:2},
  // dmsOut = show a decimal result back in d°m′s″.
  dmsOut:{cw:2, hp35:2, hp50:4, db48x:3, wp34s:2},
  // hmsAdd = bring in ONE more d°m′s″ angle and add it to a running DMS total.
  //   CW:     sexagesimal entry (6) + '+' (1) = 7 — native add, but the entry tax bites ×N.
  //   HP-35s: fake-dec entry free + →HR (2) + '+' (1) = 3; NO native HMS+, so every angle converts.
  //   HP-50g: free entry + HMS→ menu (~4) + '+' (1) = 5  (drops if HMS→ is on a quick/custom menu).
  //   DB48X:  inline-DMS entry (2) + '+' (1) = 3 — _dms values add directly.
  //   WP-34S: free entry + native H.MS+ (h X.FCN, ~3) = 3  (→ ~1 if H.MS+ is on a hotkey).
  hmsAdd:{cw:7, hp35:3, hp50:5, db48x:3, wp34s:3},
  trig:  {cw:1, hp35:1, hp50:1, db48x:1, wp34s:1},   // sin / cos / tan (or inverse)
  op:    {cw:1, hp35:1, hp50:1, db48x:1, wp34s:1},   // one arithmetic operator  + − × ÷
  enter: {cw:1, hp35:1, hp50:1, db48x:1, wp34s:1},   // = (algebraic) or Enter (RPN)
};
function costFor(ops,k){return ops.reduce((t,o)=>t+((CALC_COSTS[o]||{})[k]||0),0);}
function keypressPanel(ops){
  if(!ops||!ops.length) return '';
  const totals=CALCS.map(c=>({name:c.name, n:costFor(ops,c.key)})).sort((a,b)=>a.n-b.n);
  const min=totals[0].n;
  const rows=totals.map(t=>`<tr><td>${t.name}</td>
     <td style="text-align:right"><b>${t.n}</b>${t.n===min?' 🏆':''}</td></tr>`).join('');
  return `<div class="kfoot" style="background:rgba(127,209,232,.10)">
     ⌨ <b>Calculator Keystrokes</b> <span class="muted">— overhead for this step, digits excluded</span>
     <table class="mini" style="margin-top:6px">${rows}</table>
     <span class="muted" style="font-size:11px">ops: ${ops.join(' · ')} · draft figures, still calibrating</span></div>`;
}

}

}
function givensHTML(){ return DR.def.givens(DR.p); }
function worksheetHTML(){
  let rows='';
  DR.steps.forEach((s,i)=>{
    let state,cell;

    else if(i<DR.idx){state='done';cell=`<b style="color:var(--good)">${s.val}</b>`;}
    else if(i===DR.idx){state='now';cell='<span style="color:var(--acc2)">▶ your turn</span>';}
    else {state='soon';cell='<span class="muted">—</span>';}
    rows+=`<tr><td>${i+1}. ${s.label}</td><td style="text-align:right">${cell}</td>
       <td style="width:74px;color:var(--mut);font-size:11px">${state==='given'?'given':state==='done'?'✓':''}</td></tr>`;
  });

}

  screen.innerHTML=`
   <div class="card">
     <div class="crumb"><a onclick="modeMenu('${CUR}')">◂ Menu</a> · Step Drill · Rung ${DR.rung} of ${DR.steps.length}</div>
     <div class="dots">${DR.steps.map((_,i)=>`<i class="${i+1<=DR.rung?'on':''}"></i>`).join('')}</div>
     ${givensHTML()}
     ${worksheetHTML()}
     <div class="lesson-head" style="margin-top:14px">Step ${DR.idx+1}: ${s.label}</div>
     <p class="lead">${s.prompt}</p>
     <div class="num"><input id="dans" type="text" autocomplete="off" inputmode="text" placeholder="type here…">
       <button class="btn primary" id="dgo">Check</button></div>
     <div class="row" style="margin-top:8px">
       <button class="btn" style="width:auto" onclick="DR.showHint=true;renderKeep()">💡 Hint</button>
       <button class="btn" style="width:auto" onclick="DR.showReveal=true;renderKeep()">👁 Show me</button>
       ${SHOW_CALC&&s.ops?`<button class="btn" style="width:auto" onclick="DR.showCost=!DR.showCost;renderKeep()">⌨ Keystrokes</button>`:''}
     </div>
     ${DR.showHint?`<div class="kfoot">💡 ${s.hint}</div>`:''}
     ${DR.showReveal?`<div class="kfoot">👁 ${s.reveal}</div>`:''}
     ${DR.showCost&&SHOW_CALC&&s.ops?keypressPanel(s.ops):''}
     <div class="fb" id="dfb"></div>
   </div>`;
  const inp=el('dans'); inp.focus();
  const go=()=>{
    const raw=inp.value.trim(); if(raw==='')return;
    const v=parseDMS(raw); const fb=el('dfb');
    if(v!==null && Math.abs(v-s.ans)<=s.tol){
      award(8); syncHUD();
      DR.idx++; DR.showHint=false; DR.showReveal=false;
      if(DR.idx>=DR.steps.length) return drillRungDone();
      renderDrill();
    } else {
      fb.className='fb show no';
      fb.innerHTML=`Not quite — try again, or tap <b>💡 Hint</b> or <b>👁 Show me</b>.`;
    }
  };
  el('dgo').onclick=go;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
}
// re-render but keep whatever's typed (for hint/reveal toggles)
function renderKeep(){const cur=el('dans')?el('dans').value:'';renderDrill();if(el('dans'))el('dans').value=cur;}
function drillRungDone(){
  const n=DR.steps.length, last=DR.rung===n;
  const nextLabel=last?'':DR.steps[n-DR.rung-1].label;
  screen.innerHTML=`
   <div class="card center">
     <div class="pill" style="background:var(--good);color:#04231b">Rung ${DR.rung} done</div>
     <div class="big">${last?'🎖️':'✅'}</div>
     <p class="qtext">${last?`You ran all ${n} steps, front to back!`:`You handled the last ${DR.rung} step${DR.rung>1?'s':''}.`}</p>
     <p class="muted">${last
        ?'That’s the whole thing from a cold start. Do it again for speed, or move on.'
        :`Next round adds one more step at the front — you’ll start from <b>“${nextLabel}”</b>.`}</p>
     <div class="row" style="justify-content:center;margin-top:10px">
       ${last
         ? `<button class="btn primary" onclick="drillRung(${n})">Run it again</button>`
         : `<button class="btn primary" onclick="drillRung(${DR.rung+1})">Next rung ▸ (do ${DR.rung+1} steps)</button>
            <button class="btn" style="width:auto" onclick="drillRung(${DR.rung})">Repeat this rung</button>`}
       <button class="btn" style="width:auto" onclick="modeMenu('${CUR}')">Menu</button>
     </div>
   </div>`;
}

syncHUD();home();
</script>
</body>
</html>
