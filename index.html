<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GEOM 2120 · Survey Computations Trainer</title>
<style>
  :root{
    --bg:#0e1220; --panel:#171c2e; --panel2:#1f2740; --ink:#e8ecf7; --mut:#93a0c0;
    --line:#2a3350; --acc:#4ad1a4; --acc2:#5b9cff; --warn:#ffb454; --bad:#ff6b81;
    --good:#3ddc97; --gold:#ffd166; --m3:#4ad1a4; --m4:#5b9cff; --m5:#c08bff; --m6:#ff9e7d;
    --r:14px; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%,rgba(91,156,255,.10) 0,transparent 60%),var(--bg);
    color:var(--ink); -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:780px;margin:0 auto;padding:18px 16px 60px}
  h1{font-size:20px;margin:0;letter-spacing:.2px}
  h1 small{display:block;font-size:12px;color:var(--mut);font-weight:500;letter-spacing:.4px;margin-top:2px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
  .hud{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
  .chip{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:12px;color:var(--mut);white-space:nowrap}
  .chip b{color:var(--ink)} .chip .lv{color:var(--gold)}
  .hearts{letter-spacing:2px;font-size:13px}
  .xpwrap{height:8px;background:var(--panel2);border-radius:999px;overflow:hidden;margin:2px 0 16px;border:1px solid var(--line)}
  .xpbar{height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
  .muted{color:var(--mut)}
  .pill{display:inline-block;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--bg);background:var(--acc);padding:3px 9px;border-radius:999px;font-weight:700}
  .pill.q{background:var(--acc2)} .pill.s{background:var(--warn)} .pill.n{background:var(--gold)}
  .qtext{font-size:17px;margin:14px 0 4px;font-weight:600}
  .sub{color:var(--mut);font-size:13px;margin-bottom:14px}
  .btn{appearance:none;border:1px solid var(--line);background:var(--panel2);color:var(--ink);
       padding:13px 15px;border-radius:11px;font-size:15px;cursor:pointer;text-align:left;width:100%;
       transition:transform .06s ease,border-color .15s,background .15s}
  .btn:hover{border-color:#3b466e}
  .btn:active{transform:translateY(1px)}
  .opts{display:grid;gap:10px;margin-top:6px}
  .btn.correct{border-color:var(--good);background:rgba(61,220,151,.13)}
  .btn.wrong{border-color:var(--bad);background:rgba(255,107,129,.12)}
  .btn:disabled{cursor:default;opacity:.85}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .num{display:flex;gap:10px;margin-top:6px}
  input[type=text]{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--ink);
       padding:13px 14px;border-radius:11px;font-size:16px;font-variant-numeric:tabular-nums}

  .primary{background:linear-gradient(90deg,var(--acc),var(--acc2));color:#04231b;border:none;font-weight:700;width:auto;padding:13px 22px}
  .seqpool,.seqans{display:grid;gap:8px;margin-top:8px}

  .seqitem{cursor:pointer;user-select:none}
  .seqslot{border:1px dashed var(--line);border-radius:11px;padding:11px 13px;background:rgba(255,255,255,.02);display:flex;gap:10px;align-items:center}
  .seqslot .ix{width:22px;height:22px;border-radius:50%;background:var(--panel2);display:grid;place-items:center;font-size:12px;color:var(--mut);flex:none}
  .fb{margin-top:16px;padding:13px 15px;border-radius:11px;font-size:14px;display:none}
  .fb.show{display:block}

  .combo{font-size:13px;color:var(--gold);font-weight:700;opacity:0;transition:opacity .2s}
  .combo.show{opacity:1}
  .modegrid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:8px}
  .mode{display:flex;gap:14px;align-items:flex-start;padding:16px;cursor:pointer;border-left:3px solid transparent}

  .mode p{margin:0;color:var(--mut);font-size:13px}

  .m3b{border-left-color:var(--m3)} .m4b{border-left-color:var(--m4)} .m5b{border-left-color:var(--m5)} .m6b{border-left-color:var(--m6)} .allb{border-left-color:var(--gold)}
  .center{text-align:center}
  .big{font-size:40px;margin:6px 0}
  .tag{font-size:12px;color:var(--mut)}
  table.mini{width:100%;border-collapse:collapse;margin-top:10px;font-size:12.5px}
  table.mini th,table.mini td{border:1px solid var(--line);padding:5px 7px;text-align:left}
  table.mini th{background:var(--panel2);color:var(--mut);font-weight:600}
  a.link{color:var(--acc2);text-decoration:none;cursor:pointer}
  .lesson-tbl{overflow-x:auto;animation:fade .45s ease}
  @keyframes fade{from{opacity:.15;transform:translateY(4px)}to{opacity:1;transform:none}}
  table.mini td.hl,table.mini th.hl{background:rgba(74,209,164,.22);color:var(--ink);font-weight:700;transition:background .3s}
  .dots{display:flex;gap:6px;justify-content:center;margin:2px 0 14px;flex-wrap:wrap}
  .dots i{width:8px;height:8px;border-radius:50%;background:var(--panel2);border:1px solid var(--line)}
  .dots i.on{background:var(--acc);border-color:var(--acc)}
  .dots i.done{background:var(--line)}
  .lead{font-size:15px;color:var(--ink);margin:6px 0 4px}
  .kfoot{margin-top:13px;padding:12px 14px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);font-size:14px;color:var(--ink)}
  .lesson-head{font-size:18px;font-weight:700;margin:6px 0 2px}
  .fab{position:fixed;right:16px;bottom:16px;z-index:40;background:linear-gradient(90deg,var(--acc),var(--acc2));
       color:#04231b;border:none;font-weight:700;padding:11px 16px;border-radius:999px;box-shadow:var(--shadow);cursor:pointer;font-size:14px}
  .modal{position:fixed;inset:0;background:rgba(4,7,16,.74);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:22px 12px;overflow:auto}
  .modal.show{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:660px;width:100%;padding:18px;box-shadow:var(--shadow)}
  .sheet h3{margin:2px 0 10px}
  .sheet .x{float:right;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:5px 11px;cursor:pointer;font-size:13px}
  .figsvg{width:100%;height:auto;background:var(--bg);border:1px solid var(--line);border-radius:12px;margin-top:2px}
  #figInline{margin:8px 0 14px}
  #figInline .figsvg{width:auto;max-width:100%;max-height:290px;display:block;margin:0 auto}
  .toast{position:fixed;left:50%;top:18px;transform:translateX(-50%) translateY(-80px);
    background:var(--gold);color:#3a2c00;font-weight:700;padding:10px 18px;border-radius:999px;
    box-shadow:var(--shadow);transition:transform .35s cubic-bezier(.2,1.3,.4,1);z-index:50}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .scoreline{display:flex;justify-content:space-around;margin:18px 0;text-align:center}
  .scoreline div span{display:block;font-size:26px;font-weight:700}
  .scoreline div small{color:var(--mut)}
  .crumb{font-size:12px;color:var(--mut);margin-bottom:10px}
  .crumb a{color:var(--acc2);cursor:pointer;text-decoration:none}
  ol.proc{line-height:1.85;padding-left:20px;margin:6px 0 0}
  ol.proc li{padding-left:4px}
  h4.proc{margin:14px 0 2px;font-size:14px;color:var(--ink)}
</style>

<script>
/* ===========================================================================
   GEOM 2120 — Survey Computations Trainer (Modules 3, 4, 5)
   Content grounded in the L3A/L3B, L4A/L4B, L5A/L5B lecture worked examples.
   =========================================================================== */

/* ---------- angle helpers ---------- */
function dmsToDeg(d,m,s){const sign=d<0?-1:1;return sign*(Math.abs(d)+(m||0)/60+(s||0)/3600);}
const A=(d,m,s)=>dmsToDeg(d,m,s);                 // shorthand for answer keys
function parseDMS(str){
  const cleaned=String(str).replace(/[°'"’”]/g,' ').trim();
  if(cleaned==='')return null;
  const p=cleaned.split(/\s+/).map(Number);
  if(p.some(isNaN))return null;
  if(p.length===1)return p[0];                    // decimal degrees / plain number
  const sign=p[0]<0?-1:1;
  return sign*(Math.abs(p[0])+(p[1]||0)/60+(p[2]||0)/3600);
}

/* ===========================================================================
   MODULE CONTENT
   Each module: { key,name,emo,blurb,colour, procs[], mcq[], num[], formulae }
   procs : ordering puzzles      mcq : concept multiple-choice
   num   : numeric generators    formulae : cheat-sheet html
   =========================================================================== */

const M3={
 key:'m3', name:'Module 3 — Closed Traverse', emo:'📐', cls:'m3b', colour:'var(--m3)',
 blurb:'Loop & link traverse closure: angular misclosure → balance → bearings → ΔE/ΔN → positional misclosure → Compass Rule → coordinates.',
 procs:[
  {title:'Closed-loop closure worksheet',list:[
   "Sum the observed interior angles (ΣObs)",
   "Compute the geometric true sum (n−2)×180°",
   "Angular misclosure  eβ = ΣObs − ΣTrue",
   "Angular adjustment per angle = −eβ ⁄ n",
   "Balance the angles (apply adjustment to each)",
   "Compute forward bearings from the balanced angles",
   "ΔE = s·sin(brg) and ΔN = s·cos(brg) for each leg",
   "Sum departures & latitudes (ΣΔE, ΣΔN)",
   "Positional misclosure (eE, eN)",
   "Compass-Rule factors −eE⁄Σs and −eN⁄Σs",
   "Apply proportional adjustment to each ΔE, ΔN",
   "Relative error  er = √(eE²+eN²) and RP = 1:(Σs⁄er)"]},
  {title:'Link traverse (extra steps up front)',list:[
   "Inverse the initial baseline → initial bearing ai",
   "Inverse the final baseline → final bearing af",
   "Angular misclosure  eβ = Σβ − n·180° − (af − ai)",
   "Balance the angles, then compute forward bearings",
   "ΔE, ΔN per leg, then ΣΔE, ΣΔN",
   "eE = ΣΔE − (En−Ei),  eN = ΣΔN − (Nn−Ni)",
   "Compass-Rule adjust between the fixed points"]},
 ],
 mcq:[
  {q:"For a closed LOOP traverse, the geometric true sum of the interior angles is…",
   opts:["(n − 2) × 180°","(n + 2) × 180°","n × 180°","360° always"],a:0,
   why:"Interior angles of any polygon sum to (n − 2) × 180°."},
  {q:"Just after summing the observed angles, what comes next?",
   opts:["Angular misclosure eβ","The departures ΔE","Relative precision","The Compass factor"],a:0,
   why:"eβ = ΣObs − ΣTrue — you need the misclosure before anything can be balanced."},
  {q:"In a loop traverse the adjustment applied to each equal-weight angle is…",
   opts:["−eβ ⁄ n (split equally)","−eβ on the largest angle","eβ × distance","never applied"],a:0,
   why:"Equal-weight observations share the misclosure equally: −eβ ⁄ n per angle."},
  {q:"When are the forward bearings computed?",
   opts:["AFTER balancing the angles","BEFORE balancing","at the same time as ΣObs","after coordinates"],a:0,
   why:"Balanced angles are carried through so the final bearing closes exactly."},
  {q:"Which formula gives the departure ΔE of a leg?",
   opts:["ΔE = s · sin(bearing)","ΔE = s · cos(bearing)","ΔE = s ⁄ sin(bearing)","ΔE = bearing ⁄ s"],a:0,
   why:"Departure (easting change) = s·sin(brg); latitude ΔN = s·cos(brg)."},
  {q:"For a LOOP traverse, the easting misclosure eE equals…",
   opts:["ΣΔE  (start = end, so En−Ei = 0)","ΣΔE − 360°","Σs ⁄ ΣΔE","a large non-zero number"],a:0,
   why:"A loop returns to the same point, so eE = ΣΔE and eN = ΣΔN."},
  {q:"The Compass (Bowditch) Rule distributes the positional misclosure in proportion to…",
   opts:["each leg's distance","each leg's bearing","the number of angles","the largest ΔN"],a:0,
   why:"Leg adjustment = (−e ⁄ Σs) × s_leg — longer legs absorb more error."},
  {q:"Relative precision RP is expressed as…",
   opts:["1 : (Σs ⁄ er)","1 : (er ⁄ Σs)","er : Σs","Σs : eE"],a:0,
   why:"RP = 1 : (total length ⁄ linear error); bigger denominator = better."},
  {q:"A LINK traverse angular misclosure also subtracts…",
   opts:["(af − ai), final minus initial bearing","the largest angle","360°","Σs"],a:0,
   why:"Link: eβ = Σβ − n·180° − (af − ai); ai, af come from inversing the baselines."},
  {q:"An open traverse cannot be adjusted because…",
   opts:["there is no geometric check","it has too many angles","bearings are unknown","distances aren't measured"],a:0,
   why:"Only closed (loop/link) traverses give a check to compute a misclosure."},
 ],
 num:[ /* verified SW9 loop traverse (L3A) */
  ()=>({q:"A loop has n = 5 stations. ΣTrue, the geometric true angle sum? (degrees)",
        ans:540,tol:0.001,unit:'°',why:'(n−2)×180° = (5−2)×180° = <span class="formula">540°</span>.'}),
  ()=>({q:"ΣObs = 539°59’30” and ΣTrue = 540°. Angular misclosure eβ? (seconds)",
        ans:-30,tol:1,unit:'″',why:'eβ = ΣObs − ΣTrue = −30″.'}),
  ()=>({q:"eβ = −30″ over 5 equal angles. Adjustment per angle? (seconds, signed)",
        ans:6,tol:0.5,unit:'″',why:'−eβ⁄n = −(−30)⁄5 = <span class="formula">+6″</span> per angle.'}),
  ()=>({q:"Leg LP14→Hub1: s = 83.099 m, bearing 90°00’00”. Compute ΔE (3 dp).",
        ans:83.099,tol:0.002,unit:'m',why:'ΔE = s·sin(90°) = <span class="formula">83.099 m</span>.'}),
  ()=>({q:"Leg Hub1→Hub2: s = 97.471 m, bearing 1°35’38”. Compute ΔN (3 dp).",
        ans:97.433,tol:0.01,unit:'m',why:'ΔN = s·cos(1°35’38”) ≈ <span class="formula">97.433 m</span>.'}),
  ()=>({q:"Loop with ΣΔE = +0.019 m. The easting misclosure eE? (3 dp, signed)",
        ans:0.019,tol:0.001,unit:'m',why:'Loop ⇒ eE = ΣΔE = <span class="formula">+0.019 m</span>.'}),
  ()=>({q:"eE = +0.019, eN = −0.023. Relative (linear) error er? (3 dp)",
        ans:0.030,tol:0.0015,unit:'m',why:'er = √(0.019²+0.023²) = <span class="formula">0.030 m</span>.'}),
  ()=>({q:"er = 0.030 m, Σs = 480.729 m. Relative precision is 1 : ? (nearest 1000)",
        ans:16000,tol:600,unit:'',why:'RP = 1:(480.729⁄0.030) = 1:16,024 ≈ <span class="formula">1:16,000</span>.'}),
 ],
 formulae:`ΣTrue = (n−2)×180°  ·  eβ = ΣObs − ΣTrue  ·  adj = −eβ⁄n<br>
   ΔE = s·sin(brg)  ·  ΔN = s·cos(brg)<br>
   Loop: eE = ΣΔE, eN = ΣΔN  ·  Link: eE = ΣΔE−(En−Ei)<br>
   factor = −e⁄Σs  ·  er = √(eE²+eN²)  ·  RP = 1:(Σs⁄er)`
};

const M4={
 key:'m4', name:'Module 4 — Alt Traverse & Blunders', emo:'🔎', cls:'m4b', colour:'var(--m4)',
 blurb:'Alternate closed traverses (known baseline, swing-angle between two points) and locating a single gross error in an angle or a distance.',
 procs:[
  {title:'Traverse between 2 known points (swing angle)',list:[
   "Assume a starting bearing for the first leg",
   "Compute forward bearings & ΔE/ΔN for all legs (open traverse)",
   "Sum ΔE/ΔN → assumed bearing & distance start→end",
   "Inverse the known coordinates → TRUE start→end bearing",
   "Swing angle = assumed bearing − true bearing",
   "Rotate ALL bearings by the swing angle (angles unchanged)",
   "Recompute ΔE/ΔN and the positional misclosure",
   "Compass-Rule adjust to the fixed baseline → coordinates"]},
  {title:'Locating a single ANGULAR blunder',list:[
   "Re-check the angular misclosure calculation",
   "Forward: unadjusted angles → bearings → coords (open) to apparent end",
   "Reverse: (360°−each angle) from the reversed final bearing back to start",
   "Compare the two coordinate sets station by station",
   "The station whose coords MATCH in both sets holds the bad angle",
   "Re-measure that one angle only"]},
  {title:'Locating a single DISTANCE blunder',list:[
   "Confirm angular misclosure is acceptable; balance the angles",
   "Re-check the ΔE/ΔN values and positional misclosure",
   "Bearing of the relative error  a = tan⁻¹(eE ⁄ eN)",
   "Length of the relative error  er = √(eE²+eN²)",
   "Find the leg whose bearing ≈ that bearing (or ±180°)",
   "Re-measure that distance — the blunder ≈ er"]},
 ],
 mcq:[
  {q:"For a closed traverse between two DIFFERENT known end points, eE equals…",
   opts:["ΣΔE − (En − Ei)","ΣΔE (always)","Σs ⁄ ΣΔE","En − Ei"],a:0,
   why:"Only a loop gives eE = ΣΔE. Between two points eE = ΣΔE − (En − Ei)."},
  {q:"Two known points are not intervisible and have no reference direction. You start by…",
   opts:["assuming a starting bearing","measuring a new baseline","abandoning the traverse","using magnetic north only"],a:0,
   why:"Assume a bearing, run a preliminary calc, then correct it with the swing angle."},
  {q:"The swing angle is applied to…",
   opts:["every computed bearing (angles need no adjustment)","only the first leg","the distances","the coordinates directly"],a:0,

  const nl=1+Math.floor(S.xp/XP_PER_LVL);if(nl>S.lvl){S.lvl=nl;toast('⭐ Level '+S.lvl+'!');}return pts;}
function rightAnswer(base){S.streak++;if(S.streak>S.best){S.best=S.streak;localStorage.gx_best=S.best;}
  S.combo=1+Math.min(4,Math.floor(S.streak/3))*0.5;const p=award(base);syncHUD();return p;}
function wrongAnswer(){S.streak=0;S.combo=1;S.lives--;syncHUD();return S.lives<=0;}

   =========================================================================== */
function makeMC(){
  const bank=[].concat(...curMods().map(m=>m.mcq));
  const item=pick(bank);
  return {type:'mc',q:item.q,why:item.why,opts:shuffle(item.opts.map((t,i)=>({t,ok:i===item.a})))};
}
function makeNum(){
  const gens=[].concat(...curMods().map(m=>m.num));
  const g=pick(gens)(); g.type='num'; return g;
}
function makeSeq(){
  const m=pick(curMods()); const proc=pick(m.procs);
  let list=proc.list, start=0;
  if(list.length>6){const win=5+Math.floor(Math.random()*2);start=Math.floor(Math.random()*(list.length-win));list=list.slice(start,start+win);}
  return {type:'seq',title:proc.title,correct:list.slice(),pool:shuffle(list.map((t,i)=>({t,ord:i})))};
}

function renderNum(q){
  screen.innerHTML=`
   <div class="card">
     <div class="crumb"><a onclick="quit()">◂ Quit</a> · ${curName()}</div>
     <div class="pill n">Work the Numbers</div>
     <div class="qtext">${q.q}</div>

     <div class="num"><input id="ans" type="text" autocomplete="off" inputmode="decimal" placeholder="your answer…">
       <button class="btn primary" id="go">Check</button></div>
     <div class="ghost">Press Enter to submit.</div>
     <div class="fb" id="fb"></div>
     <div class="footer"><span class="combo" id="combo"></span><span class="tag" id="progress"></span></div>
   </div>`;
  const inp=el('ans');inp.focus();
  const submit=()=>{
    const raw=inp.value.trim();if(raw==='')return;
    const v=parseDMS(raw);el('go').disabled=true;inp.disabled=true;const fb=el('fb');
    const ok=v!==null&&Math.abs(v-q.ans)<=q.tol;
    if(ok){const p=rightAnswer(15);fb.className='fb show ok';fb.innerHTML=`✅ <b>+${p}</b>. ${q.why}`;showCombo();}
    else{fb.className='fb show no';fb.innerHTML=`❌ Answer: <b>${q.disp||(q.ans+q.unit)}</b>. ${q.why}`;
      if(wrongAnswer())return gameOver();}
    next();
  };
  el('go').onclick=submit;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')submit();});

}

function renderSeq(q){
  const placed=[];
  const draw=()=>{
    screen.innerHTML=`
     <div class="card">
       <div class="crumb"><a onclick="quit()">◂ Quit</a> · ${curName()}</div>
       <div class="pill s">Sequence It</div>
       <div class="qtext">${q.title}</div>
       <div class="sub">Tap the steps in the order they happen — ${placed.length} of ${q.correct.length} placed.</div>
       <div class="seqans" id="ans"></div><div style="height:10px"></div>
       <div class="seqpool" id="pool"></div>
       <div class="fb" id="fb"></div>
       <div class="footer"><button class="btn" style="width:auto" onclick="renderSeq(Q)">↺ Reset</button>
         <span class="tag" id="progress"></span></div>
     </div>`;
    const ans=el('ans');
    placed.forEach((p,i)=>{const d=document.createElement('div');d.className='seqslot';
      d.innerHTML=`<span class="ix">${i+1}</span><span>${p.t}</span>`;ans.appendChild(d);});
    const pool=el('pool');
    q.pool.filter(p=>!placed.includes(p)).forEach(p=>{
      const b=document.createElement('button');b.className='btn seqitem';b.textContent=p.t;
      b.onclick=()=>{placed.push(p);placed.length===q.correct.length?grade():draw();};
      pool.appendChild(b);});
    progress();
  };
  const grade=()=>{
    const ok=placed.every((p,i)=>p.t===q.correct[i]);const fb=el('fb');
    el('pool').innerHTML='';const ansEl=el('ans');ansEl.innerHTML='';
    placed.forEach((p,i)=>{const good=p.t===q.correct[i];const d=document.createElement('div');
      d.className='seqslot';d.style.borderColor=good?'var(--good)':'var(--bad)';d.style.borderStyle='solid';
      d.innerHTML=`<span class="ix">${i+1}</span><span>${good?'✅':'❌'} ${p.t}</span>`;ansEl.appendChild(d);});
    if(ok){const p=rightAnswer(20);fb.className='fb show ok';fb.innerHTML=`✅ Perfect order. <b>+${p}</b>`;}
    else{fb.className='fb show no';fb.innerHTML='❌ Correct order:<br>'+q.correct.map((t,i)=>`<b>${i+1}.</b> ${t}`).join('<br>');
      if(wrongAnswer()){setTimeout(gameOver,60);return;}}
    setTimeout(next,ok?750:2400);
  };
  draw();
}

/* ===========================================================================
   STEP DRILL — Phase 1: Angle Balancing, taught backwards (military style)
   Tiny steps, one screen each, with a worksheet that builds up.
   Backward chaining: Rung 1 = last step only … Rung 5 = whole thing.
   =========================================================================== */
function secToDMS(t){let sg=t<0?'-':'';t=Math.round(Math.abs(t));
  let d=Math.floor(t/3600);t-=d*3600;let m=Math.floor(t/60);let s=t-m*60;
  return `${sg}${d}° ${String(m).padStart(2,'0')}′ ${String(s).padStart(2,'0')}″`;}
const sgn=n=>(n>0?'+':'')+n;
function genAngleProblem(){
  for(;;){
    let misc=(Math.floor(Math.random()*21)-10)*5;          // −50..+50, step 5
    if(misc===0) misc=5;
    const target=540*3600+misc;
    let angs=[],sum=0;
    for(let i=0;i<4;i++){const a=(70+Math.floor(Math.random()*70))*3600+Math.floor(Math.random()*3600);angs.push(a);sum+=a;}
    const fifth=target-sum;
    if(fifth<60*3600||fifth>165*3600) continue;
    angs.push(fifth); angs=shuffle(angs);
    return {angs,misc,corr:-misc/5,sumSec:target};
  }
}
function revealSum(p){
  const parts=p.angs.map(a=>({d:Math.floor(a/3600),m:Math.floor((a%3600)/60),s:a%60}));
  const Ss=parts.reduce((t,x)=>t+x.s,0), cM=Math.floor(Ss/60), sF=Ss%60;
  const Sm=parts.reduce((t,x)=>t+x.m,0)+cM, cD=Math.floor(Sm/60), mF=Sm%60;
  const Sd=parts.reduce((t,x)=>t+x.d,0)+cD;
  return `Seconds: ${parts.map(x=>x.s).join(' + ')} = ${Ss}″ → write ${sF}″, carry ${cM}′.<br>`+
         `Minutes: ${parts.map(x=>x.m).join(' + ')} + ${cM} = ${Sm}′ → write ${mF}′, carry ${cD}°.<br>`+
         `Degrees: ${parts.map(x=>x.d).join(' + ')} + ${cD} = ${Sd}°.<br><b>Σ = ${Sd}° ${String(mF).padStart(2,'0')}′ ${String(sF).padStart(2,'0')}″</b>`;
}
function buildABsteps(p){
  const bal=p.angs[0]+p.corr;
  return [
   {label:'Σ measured angles', val:secToDMS(p.sumSec),
    prompt:'Add the five measured angles shown above (①–⑤) together. Type the total as <b>d m s</b> (e.g. 539 59 30).',
    ans:p.sumSec/3600, tol:4/3600,
    hint:'Add the seconds first (every 60″ carries 1′), then the minutes (every 60′ carries 1°), then the degrees.',
    reveal:revealSum(p)},
   {label:'Should total · n = 5', val:'540°',
    prompt:'What <i>should</i> the angles add up to? You have <b>n = 5</b> angles, so use (n − 2) × 180° = (5 − 2) × 180°. Answer in degrees.',
    ans:540, tol:0.001, hint:'Five corners: (5 − 2) × 180.', reveal:'(5 − 2) × 180° = <b>540°</b>.'},
   {label:'Misclosure', val:sgn(p.misc)+'″',
    prompt:'Misclosure = your sum − 540°. Answer in <b>seconds</b>, with a + or −.',
    ans:p.misc, tol:1, hint:'Subtract 540° from your total — the leftover is just seconds.',
    reveal:`Your sum − 540° = <b>${sgn(p.misc)}″</b>. ${p.misc<0?'Short of 540° → negative.':'Over 540° → positive.'}`},
   {label:'Correction / angle', val:sgn(p.corr)+'″',
    prompt:'Correction for each angle = − misclosure ÷ n. You have <b>n = 5</b> angles (see givens), so divide by 5. Seconds, with sign.',
    ans:p.corr, tol:0.5, hint:'Flip the sign of the misclosure, then divide by n = 5.',
    reveal:`−(${p.misc}) ÷ 5 = <b>${sgn(p.corr)}″</b> added to every angle.`},
   {label:'Balanced angle ①', val:secToDMS(bal),
    prompt:`Apply it. Angle ① was <b>${secToDMS(p.angs[0])}</b>. Add the ${sgn(p.corr)}″ correction and give the balanced value (d m s).`,
    ans:bal/3600, tol:4/3600, hint:'Add the correction to the seconds. If they pass 60, carry 1′. (You would do this same +'+sgn(p.corr).slice(0,1)+' to all five angles.)',
    reveal:`${secToDMS(p.angs[0])} ${p.corr<0?'−':'+'} ${Math.abs(p.corr)}″ = <b>${secToDMS(bal)}</b>.`},
  ];
}
function givensAngles(p){
  const circ=['①','②','③','④','⑤'];
  return `<div class="kfoot" style="margin:0 0 12px;background:rgba(74,209,164,.10)">
    <b>What you're given</b> &nbsp;·&nbsp; n = <b>5</b> angles measured:<br>
    <span style="font-variant-numeric:tabular-nums;line-height:1.9">${p.angs.map((a,i)=>circ[i]+' '+secToDMS(a)).join(' &nbsp; ')}</span>
  </div>`;
}

/* ---- Module 6 drills: trig levelling ---- */
const dms2=d=>secToDMS(Math.round(d*3600));            // decimal degrees → "d° m′ s″"
const r3=x=>Math.round(x*1000)/1000;
function genShortline(){
  const elevA=r3(100+Math.random()*300), Hi=r3(1.40+Math.random()*0.45), Ht=r3(1.40+Math.random()*0.45);
  const SD=r3(40+Math.random()*160);
  const ZA=((80*3600)+Math.floor(Math.random()*(20*3600)))/3600;   // 80–100°, whole arcsec
  const vc=SD*Math.cos(ZA*Math.PI/180), dH=Hi+vc-Ht, elevB=elevA+dH;
  return {elevA,Hi,Ht,SD,ZA,vc,dH,elevB};
}
function buildShortline(p){const f=x=>x.toFixed(3);return [
  {label:'Vertical part · SD·cos(ZA)', val:f(p.vc)+' m',
   prompt:`Work out the vertical part of the slope: <b>SD · cos(ZA)</b> = ${f(p.SD)} × cos(${dms2(p.ZA)}). Metres, 3 dp — mind the sign.`,
   ans:p.vc, tol:0.01,
   hint:'ZA is the ZENITH angle (from straight up), so use cos. ZA over 90° ⇒ cos negative ⇒ downhill.',
   reveal:`${f(p.SD)} × cos(${dms2(p.ZA)}) = <b>${f(p.vc)} m</b>.`},
  {label:'Height difference · ΔH', val:f(p.dH)+' m',
   prompt:`ΔH = Hi + (SD·cos ZA) − Ht = ${f(p.Hi)} + (${f(p.vc)}) − ${f(p.Ht)}. Metres, 3 dp.`,
   ans:p.dH, tol:0.012, hint:'Add the instrument height Hi, subtract the target height Ht.',
   reveal:`${f(p.Hi)} + ${f(p.vc)} − ${f(p.Ht)} = <b>${f(p.dH)} m</b>.`},
  {label:'Elevation of B', val:f(p.elevB)+' m',
   prompt:`Elev of B = Elev of A + ΔH = ${f(p.elevA)} + (${f(p.dH)}). Metres, 3 dp.`,
   ans:p.elevB, tol:0.012, hint:'Just add the height difference to the known elevation of A.',
   reveal:`${f(p.elevA)} + ${f(p.dH)} = <b>${f(p.elevB)} m</b>.`},
]; }
function givensShortline(p){const f=x=>x.toFixed(3);
  return `<div class="kfoot" style="margin:0 0 12px;background:rgba(255,158,125,.12)">
    <b>What you're given</b> — sight from A to B:<br>
    <span style="line-height:1.9">Elev of A = <b>${f(p.elevA)} m</b> &nbsp; Hi = <b>${f(p.Hi)} m</b> &nbsp; Ht = <b>${f(p.Ht)} m</b><br>
    Slope distance SD = <b>${f(p.SD)} m</b> &nbsp; Zenith angle ZA = <b>${dms2(p.ZA)}</b></span></div>`;
}
function genRecip(){
  const elevA=r3(100+Math.random()*250), t=3+Math.random()*6;
  const zaAB=Math.round((90-t)*3600)/3600, zaBA=Math.round((90+t+(Math.random()*40-20)/3600)*3600)/3600;
  const SDab=r3(50+Math.random()*120), SDba=r3(SDab+(Math.random()*0.04-0.02));
  const meanZA=(zaAB+180-zaBA)/2, meanSD=(SDab+SDba)/2;
  const elevB=elevA+meanSD*Math.cos(meanZA*Math.PI/180);
  return {elevA,zaAB,zaBA,SDab,SDba,meanZA,meanSD,elevB};
}
function buildRecip(p){const f=x=>x.toFixed(3);return [
  {label:'Mean zenith angle', val:dms2(p.meanZA),
   prompt:`Hi = Ht, so average the zeniths: <b>mean ZA = (ZA<sub>AB</sub> + 180° − ZA<sub>BA</sub>) ⁄ 2</b> = (${dms2(p.zaAB)} + 180° − ${dms2(p.zaBA)}) ⁄ 2. Answer d m s.`,
   ans:p.meanZA, tol:6/3600,
   hint:'Add 180° to the forward angle, subtract the reverse angle, then halve — lands near the forward value.',
   reveal:`(${dms2(p.zaAB)} + 180° − ${dms2(p.zaBA)}) ⁄ 2 = <b>${dms2(p.meanZA)}</b>.`},
  {label:'Mean slope distance', val:f(p.meanSD)+' m',
   prompt:`mean SD = (SD<sub>AB</sub> + SD<sub>BA</sub>) ⁄ 2 = (${f(p.SDab)} + ${f(p.SDba)}) ⁄ 2. Metres, 3 dp.`,
   ans:p.meanSD, tol:0.005, hint:'Plain average of the two measured distances.',
   reveal:`(${f(p.SDab)} + ${f(p.SDba)}) ⁄ 2 = <b>${f(p.meanSD)} m</b>.`},
  {label:'Elevation of B', val:f(p.elevB)+' m',
   prompt:`Heights cancel (Hi = Ht): <b>Elev_B = Elev_A + SD<sub>mean</sub>·cos(ZA<sub>mean</sub>)</b> = ${f(p.elevA)} + ${f(p.meanSD)} × cos(${dms2(p.meanZA)}). Metres, 3 dp.`,
   ans:p.elevB, tol:0.02, hint:'Use your mean SD and mean ZA: cos of the mean zenith, × mean distance, + Elev_A.',
   reveal:`${f(p.elevA)} + ${f(p.meanSD)} × cos(${dms2(p.meanZA)}) = <b>${f(p.elevB)} m</b>.`},
]; }
function givensRecip(p){const f=x=>x.toFixed(3);
  return `<div class="kfoot" style="margin:0 0 12px;background:rgba(255,158,125,.12)">
    <b>What you're given</b> — reciprocal sights, <b>Hi = Ht</b> (so they cancel):<br>
    <span style="line-height:1.9">Elev of A = <b>${f(p.elevA)} m</b><br>
    A→B:&nbsp; ZA = <b>${dms2(p.zaAB)}</b>, &nbsp;SD = <b>${f(p.SDab)} m</b><br>
    B→A:&nbsp; ZA = <b>${dms2(p.zaBA)}</b>, &nbsp;SD = <b>${f(p.SDba)} m</b></span></div>`;
}

/* ---- Module 3 drill: Compass (Bowditch) Rule corrections ---- */
function genCompass(){
  const nLegs=4+Math.floor(Math.random()*2);
  let legs=[];
  for(let i=0;i<nLegs-1;i++){const d=50+Math.random()*120, b=Math.random()*360;
    legs.push({d, dE:d*Math.sin(b*Math.PI/180), dN:d*Math.cos(b*Math.PI/180)});}
  const sumE=legs.reduce((t,l)=>t+l.dE,0), sumN=legs.reduce((t,l)=>t+l.dN,0);
  const rs=()=>Math.random()<0.5?-1:1;
  const eEt=rs()*(0.006+Math.random()*0.022), eNt=rs()*(0.006+Math.random()*0.022);
  legs.push({d:Math.hypot(eEt-sumE,eNt-sumN), dE:eEt-sumE, dN:eNt-sumN});
  legs=legs.map(l=>({d:r3(l.d), dE:r3(l.dE), dN:r3(l.dN)}));
  const Ss=r3(legs.reduce((t,l)=>t+l.d,0));
  const eE=r3(legs.reduce((t,l)=>t+l.dE,0)), eN=r3(legs.reduce((t,l)=>t+l.dN,0));
  const focus=Math.floor(Math.random()*legs.length), fl=legs[focus];
  const corrE=-eE*fl.d/Ss, corrN=-eN*fl.d/Ss;
  return {legs, Ss, eE, eN, focus, corrE, corrN, adjE:fl.dE+corrE, adjN:fl.dN+corrN};
}
function buildCompass(p){
  const f=x=>x.toFixed(3), fl=p.legs[p.focus], L=p.focus+1;
  return [
   {label:'East misclosure · eE = ΣΔE', val:f(p.eE)+' m',
    prompt:`Add up the ΔE column (the departures). A closed loop comes back to its start, so they <i>should</i> total <b>0</b> — whatever's left over is the East misclosure <b>eE</b>. (3 dp, signed)`,
    ans:p.eE, tol:0.004, hint:'Just sum every leg\'s ΔE. The little leftover is the misclosure.',
    reveal:`ΣΔE = <b>${f(p.eE)} m</b>.`},
   {label:'North misclosure · eN = ΣΔN', val:f(p.eN)+' m',
    prompt:`Now sum the ΔN column (the latitudes) for the North misclosure <b>eN</b>. (3 dp, signed)`,
    ans:p.eN, tol:0.004, hint:'Sum every leg\'s ΔN.', reveal:`ΣΔN = <b>${f(p.eN)} m</b>.`},
   {label:`Leg ${L} · ΔE correction`, val:f(p.corrE)+' m',
    prompt:`Correct leg <b>${L}</b> in proportion to its length: <b>corr = −eE × (d ⁄ Σs)</b> = −(${f(p.eE)}) × (${f(fl.d)} ⁄ ${f(p.Ss)}). (3 dp, signed)`,
    ans:p.corrE, tol:0.0015,
    hint:'Here\'s the difference from angle balancing: share by LENGTH (d ⁄ Σs), not equally — longer legs absorb more.',
    reveal:`−(${f(p.eE)}) × (${f(fl.d)} ⁄ ${f(p.Ss)}) = <b>${f(p.corrE)} m</b>.`},
   {label:`Leg ${L} · ΔN correction`, val:f(p.corrN)+' m',
    prompt:`Same idea for the North side: <b>corr = −eN × (d ⁄ Σs)</b> = −(${f(p.eN)}) × (${f(fl.d)} ⁄ ${f(p.Ss)}). (3 dp, signed)`,
    ans:p.corrN, tol:0.0015, hint:'Same proportional share, using eN.',
    reveal:`−(${f(p.eN)}) × (${f(fl.d)} ⁄ ${f(p.Ss)}) = <b>${f(p.corrN)} m</b>.`},
   {label:`Leg ${L} · adjusted ΔE`, val:f(p.adjE)+' m',
    prompt:`Apply it: adjusted ΔE = ΔE + correction = ${f(fl.dE)} + (${f(p.corrE)}). (3 dp)`,
    ans:p.adjE, tol:0.0015, hint:'Add the correction onto the original ΔE.',
    reveal:`${f(fl.dE)} + (${f(p.corrE)}) = <b>${f(p.adjE)} m</b>.`},
   {label:`Leg ${L} · adjusted ΔN`, val:f(p.adjN)+' m',
    prompt:`And adjusted ΔN = ΔN + correction = ${f(fl.dN)} + (${f(p.corrN)}). (3 dp)`,
    ans:p.adjN, tol:0.0015, hint:'Add the correction onto the original ΔN.',
    reveal:`${f(fl.dN)} + (${f(p.corrN)}) = <b>${f(p.adjN)} m</b>.`},
  ];
}
function givensCompass(p){
  const f=x=>x.toFixed(3), sg=x=>(x>=0?'+':'')+f(x);
  const rows=p.legs.map((l,i)=>`<tr${i===p.focus?' style="background:rgba(255,209,102,.20)"':''}><td>${i+1}${i===p.focus?' ◀':''}</td><td style="text-align:right">${f(l.d)}</td><td style="text-align:right">${sg(l.dE)}</td><td style="text-align:right">${sg(l.dN)}</td></tr>`).join('');
  return `<div class="kfoot" style="margin:0 0 12px;background:rgba(74,209,164,.10)">
    <b>What you're given</b> — a closed loop; we're adjusting <b>leg ${p.focus+1}</b> (highlighted):
    <table class="mini" style="margin-top:6px"><tr><th>Leg</th><th>Dist</th><th>ΔE</th><th>ΔN</th></tr>${rows}
    <tr><td><b>Σs</b></td><td style="text-align:right"><b>${f(p.Ss)}</b></td><td>—</td><td>—</td></tr></table></div>`;
}

/* ---- drill registry ---- */
const DRILLS={
 m3_angles:{module:'m3', title:'Angle Balancing', phase:'M3 · Phase 1',
   card:'Balancing the angles. Tiny steps — last step first, build up to the whole thing. Fresh numbers, no clock.',
   intro:['Add up the five measured angles','Work out what they <i>should</i> total — (n−2)×180°','Find the <b>misclosure</b> (how far off)','Find the <b>correction</b> for each angle','Apply it → the balanced angle'],
   gen:genAngleProblem, build:buildABsteps, givens:givensAngles},
 m3_compass:{module:'m3', title:'Compass-Rule Corrections', phase:'M3 · Phase 5',
   card:'Bowditch / Compass Rule: spread the positional misclosure along the legs — by LENGTH this time, not equally. Six tiny steps.',
   intro:['East misclosure eE = ΣΔE','North misclosure eN = ΣΔN','Leg correction (ΔE) = −eE × (d ⁄ Σs)','Leg correction (ΔN) = −eN × (d ⁄ Σs)','Adjusted ΔE = ΔE + correction','Adjusted ΔN = ΔN + correction'],
   credit:'The Compass / <b>Bowditch</b> Rule — after Nathaniel Bowditch, American navigator (1773–1838), borrowed by surveyors from his sea-traverse methods.',
   gen:genCompass, build:buildCompass, givens:givensCompass},
 m6_short:{module:'m6', title:'Short-line Elevation', phase:'M6 · Phase J',
   card:'One trig-levelling line. Three steps: the vertical part, the height difference, the new elevation.',
   intro:['Vertical part = SD · cos(ZA)','Height difference ΔH = Hi + SD·cos ZA − Ht','Elevation of B = Elev of A + ΔH'],
   gen:genShortline, build:buildShortline, givens:givensShortline},
 m6_recip:{module:'m6', title:'Reciprocal Levelling', phase:'M6 · Phase K (A6 Q1)',
   card:'Forward + reverse sights with Hi = Ht — the A6 Q1 type. Mean the angle, mean the distance, get the elevation.',
   intro:['Mean zenith angle = (ZA_AB + 180° − ZA_BA) ⁄ 2','Mean slope distance = (SD_AB + SD_BA) ⁄ 2','Elev of B = Elev of A + SD_mean · cos(ZA_mean)'],
   gen:genRecip, build:buildRecip, givens:givensRecip},
};

let DR={def:null,p:null,steps:[],idx:0,start:0,rung:1,showHint:false,showReveal:false};

function startDrill(key){ DR.def=DRILLS[key]; clearLessonTimer(); drillIntro(); }
function drillIntro(){
  const d=DR.def, n=d.intro.length;
  const words=['','one','two','three','four','five','six'][n]||n;
  screen.innerHTML=`
   <div class="card">
     <div class="crumb"><a onclick="modeMenu('${CUR}')">◂ Menu</a> · Step Drill · ${d.title}</div>
     <div class="pill s">${d.phase} · go slow</div>
     <p class="qtext" style="margin-top:12px">${d.title} — built backwards 🪜</p>
     <p class="sub">The ${words} little steps, in order:</p>
     <ol class="proc">${d.intro.map(s=>`<li>${s}</li>`).join('')}</ol>
     ${d.credit?`<p class="sub" style="font-style:italic;margin-top:8px">${d.credit}</p>`:''}
     <div class="kfoot">We'll learn these <b>back to front</b>. Round 1: you do only the <b>last</b> step (the rest filled in for you). Each round adds one more step at the front, until you run all ${n} cold. Fresh numbers every time — no memorising. No lives, no clock.</div>
     <div class="footer"><span class="tag">Rung 1 of ${n}</span>
       <button class="btn primary" onclick="drillRung(1)">Start with the last step ▸</button></div>
   </div>`;
}
function drillRung(r){
  const d=DR.def; DR.rung=r; DR.p=d.gen(); DR.steps=d.build(DR.p);
  DR.start=DR.steps.length-r; DR.idx=DR.start; DR.showHint=false; DR.showReveal=false;
  renderDrill();
}
function givensHTML(){ return DR.def.givens(DR.p); }
function worksheetHTML(){
  let rows='';
  DR.steps.forEach((s,i)=>{
    let state,cell;
    if(i<DR.start){state='given';cell=`<span class="muted">${s.val}</span>`;}
    else if(i<DR.idx){state='done';cell=`<b style="color:var(--good)">${s.val}</b>`;}
    else if(i===DR.idx){state='now';cell='<span style="color:var(--acc2)">▶ your turn</span>';}
    else {state='soon';cell='<span class="muted">—</span>';}
    rows+=`<tr><td>${i+1}. ${s.label}</td><td style="text-align:right">${cell}</td>
       <td style="width:74px;color:var(--mut);font-size:11px">${state==='given'?'given':state==='done'?'✓':''}</td></tr>`;
  });
  return `<table class="mini">${rows}</table>`;
}
function renderDrill(){
  const s=DR.steps[DR.idx];
  screen.innerHTML=`
   <div class="card">
     <div class="crumb"><a onclick="modeMenu('${CUR}')">◂ Menu</a> · Step Drill · Rung ${DR.rung} of ${DR.steps.length}</div>
     <div class="dots">${DR.steps.map((_,i)=>`<i class="${i+1<=DR.rung?'on':''}"></i>`).join('')}</div>
     ${givensHTML()}
     ${worksheetHTML()}
     <div class="lesson-head" style="margin-top:14px">Step ${DR.idx+1}: ${s.label}</div>
     <p class="lead">${s.prompt}</p>
     <div class="num"><input id="dans" type="text" autocomplete="off" inputmode="text" placeholder="type here…">
       <button class="btn primary" id="dgo">Check</button></div>
     <div class="row" style="margin-top:8px">
       <button class="btn" style="width:auto" onclick="DR.showHint=true;renderKeep()">💡 Hint</button>
       <button class="btn" style="width:auto" onclick="DR.showReveal=true;renderKeep()">👁 Show me</button>
     </div>
     ${DR.showHint?`<div class="kfoot">💡 ${s.hint}</div>`:''}
     ${DR.showReveal?`<div class="kfoot">👁 ${s.reveal}</div>`:''}
     <div class="fb" id="dfb"></div>
   </div>`;
  const inp=el('dans'); inp.focus();
  const go=()=>{
    const raw=inp.value.trim(); if(raw==='')return;
    const v=parseDMS(raw); const fb=el('dfb');
    if(v!==null && Math.abs(v-s.ans)<=s.tol){
      award(8); syncHUD();
      DR.idx++; DR.showHint=false; DR.showReveal=false;
      if(DR.idx>=DR.steps.length) return drillRungDone();
      renderDrill();
    } else {
      fb.className='fb show no';
      fb.innerHTML=`Not quite — try again, or tap <b>💡 Hint</b> or <b>👁 Show me</b>.`;
    }
  };
  el('dgo').onclick=go;
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
}
// re-render but keep whatever's typed (for hint/reveal toggles)
function renderKeep(){const cur=el('dans')?el('dans').value:'';renderDrill();if(el('dans'))el('dans').value=cur;}
function drillRungDone(){
  const n=DR.steps.length, last=DR.rung===n;
  const nextLabel=last?'':DR.steps[n-DR.rung-1].label;
  screen.innerHTML=`
   <div class="card center">
     <div class="pill" style="background:var(--good);color:#04231b">Rung ${DR.rung} done</div>
     <div class="big">${last?'🎖️':'✅'}</div>
     <p class="qtext">${last?`You ran all ${n} steps, front to back!`:`You handled the last ${DR.rung} step${DR.rung>1?'s':''}.`}</p>
     <p class="muted">${last
        ?'That’s the whole thing from a cold start. Do it again for speed, or move on.'
        :`Next round adds one more step at the front — you’ll start from <b>“${nextLabel}”</b>.`}</p>
     <div class="row" style="justify-content:center;margin-top:10px">
       ${last
         ? `<button class="btn primary" onclick="drillRung(${n})">Run it again</button>`
         : `<button class="btn primary" onclick="drillRung(${DR.rung+1})">Next rung ▸ (do ${DR.rung+1} steps)</button>
            <button class="btn" style="width:auto" onclick="drillRung(${DR.rung})">Repeat this rung</button>`}
       <button class="btn" style="width:auto" onclick="modeMenu('${CUR}')">Menu</button>
     </div>
   </div>`;
}

syncHUD();home();
</script>
